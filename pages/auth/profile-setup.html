<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール設定 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- アイコン -->
  <link rel="icon" href="../../favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="../../apple-touch-icon-180x180.png" sizes="180x180">
  <link rel="icon" type="image/png" href="../../android-chrome-192x192.png" sizes="192x192">
  <style>
    body {
      background: var(--navy-900);
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(37,77,122,0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .register-container { width: 100%; max-width: 640px; margin: 0 auto; animation: fadeInUp 0.5s ease both; }
    .register-logo { text-align: center; margin-bottom: var(--space-6); }
    .register-logo__name { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 700; color: var(--white); }
    .register-logo__sub { font-size: var(--text-xs); color: var(--gold-400); letter-spacing: .25em; text-transform: uppercase; display: block; margin-top: var(--space-1); }
    .register-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-xl); padding: var(--space-8); backdrop-filter: blur(12px);
    }
    .register-card h2 { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 700; color: var(--white); margin-bottom: var(--space-2); }
    .register-card .form-label { color: var(--gray-300); }
    .register-card .form-control {
      background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: var(--white);
    }
    .register-card .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .register-card .form-control:focus { border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .register-card select.form-control option { background: var(--navy-800); color: var(--white); }
    .register-card .form-control.field-error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(192,57,43,0.15); }
    .field-error-msg { font-size: var(--text-xs); color: #f1948a; margin-top: var(--space-1); display: none; }
    .field-error-msg.show { display: block; }
    .section-title {
      font-size: var(--text-xs); font-weight: 500; color: var(--gold-400); letter-spacing: .2em;
      text-transform: uppercase; border-bottom: 1px solid rgba(201,168,76,0.2);
      padding-bottom: var(--space-2); margin-bottom: var(--space-5); margin-top: var(--space-6);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .submit-btn {
      width: 100%; padding: var(--space-4); background: var(--gold-500); color: var(--navy-900);
      border: none; border-radius: var(--radius-md); font-size: var(--text-base); font-weight: 700;
      cursor: pointer; transition: all var(--transition-fast); font-family: var(--font-body); margin-top: var(--space-6);
    }
    .submit-btn:hover { background: var(--gold-400); box-shadow: var(--shadow-gold); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
    .error-box {
      background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4);
      border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
      color: #f1948a; font-size: var(--text-sm); margin-bottom: var(--space-4); display: none;
    }
    .error-box.show { display: block; }
    /* 認証待ち画面 */
    .auth-wait { text-align: center; padding: var(--space-10) 0; }
    .auth-wait__icon {
      width: 56px; height: 56px; background: rgba(201,168,76,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4);
    }
    .auth-wait__title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 700; color: var(--white); margin-bottom: var(--space-3); }
    .auth-wait__desc { font-size: var(--text-sm); color: var(--gray-300); line-height: 1.8; }
    @media(max-width:480px){ .form-row { grid-template-columns: 1fr; } .register-card { padding: var(--space-5); } }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-logo">
    <span class="register-logo__name">東大阪吹奏楽団</span>
    <span class="register-logo__sub">HIGASUI WINDS · プロフィール設定</span>
  </div>

  <div class="register-card">

    <!-- ── 認証未完了時の待機メッセージ ── -->
    <div class="auth-wait" id="auth-wait">
      <div class="loading-spinner" style="margin: 0 auto var(--space-4);"></div>
      <p style="font-size:var(--text-sm);color:var(--gray-300);">認証情報を確認しています…</p>
    </div>

    <!-- ── 認証完了後のフォーム ── -->
    <div id="form-area" style="display:none;">
      <h2>プロフィールを設定してください</h2>
      <p style="font-size:var(--text-sm);color:rgba(255,255,255,0.5);margin-bottom:var(--space-2);">
        認証が完了しました。以下の情報を入力して登録を完了させてください。
      </p>

      <div class="error-box" id="error-box"></div>

      <!-- 基本情報 -->
      <p class="section-title">基本情報</p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="last-name">姓 <span class="required">*</span></label>
          <input type="text" id="last-name" class="form-control" placeholder="東大阪">
          <span class="field-error-msg" id="err-last-name"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="first-name">名 <span class="required">*</span></label>
          <input type="text" id="first-name" class="form-control" placeholder="太郎">
          <span class="field-error-msg" id="err-first-name"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="last-kana">姓（フリガナ）<span class="required">*</span></label>
          <input type="text" id="last-kana" class="form-control" placeholder="ヒガシオオサカ">
          <span class="field-error-msg" id="err-last-kana"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="first-kana">名（フリガナ）<span class="required">*</span></label>
          <input type="text" id="first-kana" class="form-control" placeholder="タロウ">
          <span class="field-error-msg" id="err-first-kana"></span>
        </div>
      </div>

      <!-- 役職（複数選択） -->
      <div class="form-group" style="margin-top:var(--space-2);">
        <label class="form-label">役職 <span class="required">*</span>
          <span style="font-size:var(--text-xs);color:rgba(255,255,255,0.3);font-weight:400;">（複数選択可）</span>
        </label>
        <div class="role-checkbox-group" id="role-group"></div>
        <span class="field-error-msg" id="err-role"></span>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="part">パート <span class="required">*</span></label>
          <select id="part" class="form-control">
            <option value="">選択してください</option>
            <optgroup label="木管楽器">
              <option value="piccolo">Piccolo</option>
              <option value="flute">Flute</option>
              <option value="oboe">Oboe</option>
              <option value="clarinet">Clarinet</option>
              <option value="bassclarinet">BassClarinet</option>
              <option value="bassoon">Bassoon</option>
              <option value="ssaxophone">S.Saxophone</option>
              <option value="asaxophone">A.Saxophone</option>
              <option value="tsaxophone">T.Saxophone</option>
              <option value="bsaxophone">B.Saxophone</option>
            </optgroup>
            <optgroup label="金管楽器">
              <option value="trumpet">Trumpet</option>
              <option value="horn">Horn</option>
              <option value="trombone">Trombone</option>
              <option value="euphonium">Euphonium</option>
              <option value="tuba">Tuba</option>
            </optgroup>
            <optgroup label="打楽器・その他">
              <option value="percussion">Percussion</option>
              <option value="contrabass">Contrabass</option>
            </optgroup>
            <optgroup label="その他">
              <option value="staff">スタッフ</option>
              <option value="other">その他</option>
            </optgroup>
          </select>
          <span class="field-error-msg" id="err-part"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="category">区分 <span class="required">*</span></label>
          <select id="category" class="form-control">
            <option value="">選択してください</option>
            <option value="regular">正団員</option>
            <option value="trainee">準団員</option>
            <option value="rest">休団中</option>
            <option value="support">賛助</option>
          </select>
          <span class="field-error-msg" id="err-category"></span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="joined-date">在籍開始年月日 <span class="required">*</span></label>
          <input type="date" id="joined-date" class="form-control">
          <span class="field-error-msg" id="err-joined-date"></span>
        </div>
      </div>

      <!-- 連絡先情報 -->
      <p class="section-title">連絡先情報</p>
      <div class="form-group">
        <label class="form-label" for="email-display">メールアドレス</label>
        <input type="email" id="email-display" class="form-control" readonly
          style="background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);cursor:default;">
        <span class="form-hint" style="color:rgba(255,255,255,0.3);">認証済みのメールアドレスです。</span>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="phone">電話番号</label>
          <input type="tel" id="phone" class="form-control" placeholder="090-0000-0000">
        </div>
        <div class="form-group">
          <label class="form-label" for="birthday">生年月日</label>
          <input type="date" id="birthday" class="form-control">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="emergency-contact">緊急連絡先</label>
        <input type="text" id="emergency-contact" class="form-control" placeholder="氏名：続柄：電話番号">
        <span class="form-hint" style="color:rgba(255,255,255,0.4);">例：東大阪 花子：母：090-0000-0001</span>
      </div>

      <button class="submit-btn" id="save-btn" type="button">登録を完了する</button>
    </div>

    <!-- ── 認証未完了の場合 ── -->
    <div class="auth-wait" id="auth-error" style="display:none;">
      <div class="auth-wait__icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="#f1948a" stroke-width="1.5" width="28" height="28">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
        </svg>
      </div>
      <p class="auth-wait__title" style="color:#f1948a;">認証に失敗しました</p>
      <p class="auth-wait__desc">リンクが無効か期限切れです。<br>新規登録からやり直してください。</p>
      <div style="margin-top:var(--space-6);">
        <a href="register.html" style="font-size:var(--text-sm);color:var(--gold-400);text-decoration:underline;text-underline-offset:2px;">
          新規登録に戻る
        </a>
      </div>
    </div>

  </div>
</div>

<script src="../../js/supabase.js"></script>
<script src="../../js/common.js"></script>
<script>
const KATAKANA_RE = /^[ァ-ヶー　\s]+$/;

function setFieldError(fieldId, errId, message) {
  document.getElementById(fieldId)?.classList.add('field-error');
  const el = document.getElementById(errId);
  if (el) { el.textContent = message; el.classList.add('show'); }
}

function clearAllErrors() {
  document.getElementById('error-box').textContent = '';
  document.getElementById('error-box').classList.remove('show');
  [
    ['last-name','err-last-name'], ['first-name','err-first-name'],
    ['last-kana','err-last-kana'], ['first-kana','err-first-kana'],
    ['part','err-part'], ['category','err-category'], ['joined-date','err-joined-date'],
  ].forEach(([f, e]) => {
    document.getElementById(f)?.classList.remove('field-error');
    const el = document.getElementById(e);
    if (el) { el.textContent = ''; el.classList.remove('show'); }
  });
  const errRole = document.getElementById('err-role');
  if (errRole) { errRole.textContent = ''; errRole.classList.remove('show'); }
}

document.addEventListener('DOMContentLoaded', async () => {

  // ── 役職チェックボックスを ROLE_DEFINITIONS から動的生成 ──
  const roleGroup = document.getElementById('role-group');
  ROLE_DEFINITIONS.forEach(def => {
    const label = document.createElement('label');
    label.className = 'role-checkbox-item';
    label.innerHTML = `
      <input type="checkbox" name="role" value="${def.value}"${def.value === 'member' ? ' checked' : ''}>
      <span>${def.label}</span>
    `;
    roleGroup.appendChild(label);
  });

  // ── セッション確認 ──
  // Supabaseの認証メールリンクをクリックするとURLにアクセストークンが含まれる。
  // getSession() で認証済みユーザーを取得する。
  if (!_sb) {
    // Supabase未接続時はデモ表示
    document.getElementById('auth-wait').style.display = 'none';
    document.getElementById('email-display').value = 'demo@example.com';
    document.getElementById('form-area').style.display = 'block';
    return;
  }

  // URLハッシュにトークンが含まれる場合はSupabaseが自動処理する
  const { data: { session }, error: sessionError } = await _sb.auth.getSession();

  if (sessionError || !session) {
    document.getElementById('auth-wait').style.display = 'none';
    document.getElementById('auth-error').style.display = 'block';
    return;
  }

  const user = session.user;

  // すでに profiles が存在する場合はダッシュボードへ
  const { data: existingProfile } = await _sb
    .from('profiles')
    .select('id')
    .eq('id', user.id)
    .maybeSingle();

  if (existingProfile) {
    // 既登録ユーザーがメールリンクを再クリックした場合
    // セッション情報を取得してダッシュボードへ
    const { data: profile } = await _sb
      .from('profiles')
      .select('id, last_name, first_name, roles, part')
      .eq('id', user.id)
      .single();
    if (profile) {
      const roles = Array.isArray(profile.roles) && profile.roles.length > 0
        ? profile.roles : ['member'];
      sessionStorage.setItem('hs_user', JSON.stringify({
        id:    profile.id,
        name:  `${profile.last_name}${profile.first_name}`,
        roles,
        part:  profile.part,
      }));
    }
    window.location.href = '../../index.html';
    return;
  }

  // フォームを表示
  document.getElementById('auth-wait').style.display = 'none';
  document.getElementById('email-display').value = user.email ?? '';
  document.getElementById('form-area').style.display = 'block';

  // ── 保存ボタン ──
  document.getElementById('save-btn').addEventListener('click', async () => {
    clearAllErrors();
    let hasError = false;

    const lastName   = document.getElementById('last-name').value.trim();
    const firstName  = document.getElementById('first-name').value.trim();
    const lastKana   = document.getElementById('last-kana').value.trim();
    const firstKana  = document.getElementById('first-kana').value.trim();
    const part       = document.getElementById('part').value;
    const category   = document.getElementById('category').value;
    const joinedDate = document.getElementById('joined-date').value;

    if (!lastName)  { setFieldError('last-name','err-last-name','姓を入力してください。'); hasError = true; }
    if (!firstName) { setFieldError('first-name','err-first-name','名を入力してください。'); hasError = true; }

    if (!lastKana) {
      setFieldError('last-kana','err-last-kana','姓（フリガナ）を入力してください。'); hasError = true;
    } else if (!KATAKANA_RE.test(lastKana)) {
      setFieldError('last-kana','err-last-kana','フリガナはカタカナで入力してください。'); hasError = true;
    }
    if (!firstKana) {
      setFieldError('first-kana','err-first-kana','名（フリガナ）を入力してください。'); hasError = true;
    } else if (!KATAKANA_RE.test(firstKana)) {
      setFieldError('first-kana','err-first-kana','フリガナはカタカナで入力してください。'); hasError = true;
    }

    const selectedRoles = [...document.querySelectorAll('input[name="role"]:checked')].map(cb => cb.value);
    if (selectedRoles.length === 0) {
      const errRole = document.getElementById('err-role');
      errRole.textContent = '役職を1つ以上選択してください。';
      errRole.classList.add('show');
      hasError = true;
    }

    if (!part)       { setFieldError('part','err-part','パートを選択してください。'); hasError = true; }
    if (!category)   { setFieldError('category','err-category','区分を選択してください。'); hasError = true; }
    if (!joinedDate) { setFieldError('joined-date','err-joined-date','在籍開始年月日を入力してください。'); hasError = true; }

    if (hasError) return;

    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = '登録中…';

    const { error: insertError } = await _sb.from('profiles').insert({
      id:                user.id,
      last_name:         lastName,
      first_name:        firstName,
      last_kana:         lastKana,
      first_kana:        firstKana,
      roles:             selectedRoles,
      part,
      category,
      email:             user.email,
      phone:             document.getElementById('phone').value.trim(),
      birthday:          document.getElementById('birthday').value || null,
      emergency_contact: document.getElementById('emergency-contact').value.trim(),
      joined_date:       joinedDate,
    });

    if (insertError) {
      btn.disabled = false;
      btn.textContent = '登録を完了する';
      const errorBox = document.getElementById('error-box');
      errorBox.textContent = `登録に失敗しました: ${insertError.message}`;
      errorBox.classList.add('show');
      return;
    }

    // セッションに保存してダッシュボードへ
    sessionStorage.setItem('hs_user', JSON.stringify({
      id:    user.id,
      name:  `${lastName}${firstName}`,
      roles: selectedRoles,
      part,
    }));

    window.location.href = '../../index.html';
  });
});
</script>
</body>
</html>
