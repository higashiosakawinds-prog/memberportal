<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background: var(--navy-900);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-4);
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(37,77,122,0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-container { width: 100%; max-width: 420px; animation: fadeInUp 0.5s ease both; }
    .login-logo { text-align: center; margin-bottom: var(--space-8); }
    .login-logo__name {
      font-family: var(--font-display); font-size: var(--text-3xl);
      font-weight: 700; color: var(--white); letter-spacing: 0.05em;
      display: block; margin-bottom: var(--space-1);
    }
    .login-logo__sub { font-size: var(--text-xs); color: var(--gold-400); letter-spacing: 0.3em; text-transform: uppercase; }
    .login-logo__divider { width: 40px; height: 1px; background: var(--gold-500); margin: var(--space-3) auto; }
    .login-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-xl); padding: var(--space-8); backdrop-filter: blur(12px);
    }
    .login-card h2 {
      font-family: var(--font-display); font-size: var(--text-2xl);
      font-weight: 700; color: var(--white); margin-bottom: var(--space-6); text-align: center;
    }
    .login-card .form-label { color: var(--gray-300); }
    .login-card .form-control {
      background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: var(--white);
    }
    .login-card .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .login-card .form-control:focus { border-color: var(--gold-500); box-shadow: 0 0 0 3px rgba(201,168,76,0.15); }
    .login-card .form-control.field-error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(192,57,43,0.15); }
    .field-error-msg { font-size: var(--text-xs); color: #f1948a; margin-top: var(--space-1); display: none; }
    .field-error-msg.show { display: block; }
    .login-submit {
      width: 100%; padding: var(--space-4); background: var(--gold-500); color: var(--navy-900);
      border: none; border-radius: var(--radius-md); font-size: var(--text-base); font-weight: 700;
      cursor: pointer; transition: background var(--transition-fast), box-shadow var(--transition-fast);
      margin-top: var(--space-2); font-family: var(--font-body); letter-spacing: 0.05em;
    }
    .login-submit:hover { background: var(--gold-400); box-shadow: var(--shadow-gold); }
    .login-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-footer { text-align: center; margin-top: var(--space-6); }
    .login-footer a { font-size: var(--text-sm); color: var(--gold-400); text-decoration: underline; text-underline-offset: 2px; }
    .error-box {
      background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.4);
      border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
      color: #f1948a; font-size: var(--text-sm); margin-bottom: var(--space-4); display: none;
    }
    .error-box.show { display: block; }
    .sent-box { display: none; text-align: center; }
    .sent-box.show { display: block; }
    .sent-icon {
      width: 56px; height: 56px; background: rgba(201,168,76,0.15); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4);
    }
    .sent-title {
      font-family: var(--font-display); font-size: var(--text-xl);
      font-weight: 700; color: var(--white); margin-bottom: var(--space-3);
    }
    .sent-desc { font-size: var(--text-sm); color: var(--gray-300); line-height: 1.8; }
    .sent-email { color: var(--gold-400); font-weight: 500; }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-logo">
    <span class="login-logo__name">東大阪吹奏楽団</span>
    <div class="login-logo__divider"></div>
    <span class="login-logo__sub">HIGASUI WINDS · 団員登録</span>
  </div>

  <div class="login-card">
    <!-- ── 入力フォーム ── -->
    <div id="form-area">
      <h2>新規登録</h2>
      <div class="error-box" id="error-box"></div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス <span class="required">*</span></label>
        <input type="email" id="email" class="form-control" placeholder="example@mail.com" autocomplete="email">
        <span class="field-error-msg" id="err-email"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード <span class="required">*</span></label>
        <input type="password" id="password" class="form-control" placeholder="8文字以上" autocomplete="new-password">
        <span class="form-hint" style="color:rgba(255,255,255,0.4);">英字・数字を含む8文字以上で設定してください。</span>
        <span class="field-error-msg" id="err-password"></span>
      </div>
      <div class="form-group">
        <label class="form-label" for="password-confirm">パスワード（確認）<span class="required">*</span></label>
        <input type="password" id="password-confirm" class="form-control" placeholder="もう一度入力してください" autocomplete="new-password">
        <span class="field-error-msg" id="err-password-confirm"></span>
      </div>

      <button class="login-submit" id="register-btn" type="button">登録メールを送信する</button>
      <div class="login-footer">
        <a href="login.html">ログインに戻る</a>
      </div>
    </div>

    <!-- ── 送信完了メッセージ ── -->
    <div class="sent-box" id="sent-area">
      <div class="sent-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="var(--gold-400)" stroke-width="1.5" width="28" height="28">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
        </svg>
      </div>
      <p class="sent-title">認証メールを送信しました</p>
      <p class="sent-desc">
        <span class="sent-email" id="sent-email-display"></span><br>
        に確認メールを送りました。<br>
        メール内のリンクをクリックしたのち<br>
        以下からログイン後、プロフィールの入力をお願いします。
      </p>
      <div style="margin-top:var(--space-6);">
        <a href="login.html" style="font-size:var(--text-sm);color:var(--gold-400);text-decoration:underline;text-underline-offset:2px;">
          ログイン画面に戻る
        </a>
      </div>
    </div>
  </div>
</div>

<script src="../../js/supabase.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const btn      = document.getElementById('register-btn');
  const errorBox = document.getElementById('error-box');

  function setFieldError(fieldId, errId, message) {
    document.getElementById(fieldId)?.classList.add('field-error');
    const el = document.getElementById(errId);
    if (el) { el.textContent = message; el.classList.add('show'); }
  }

  function clearAllErrors() {
    errorBox.textContent = '';
    errorBox.classList.remove('show');
    [['email','err-email'],['password','err-password'],['password-confirm','err-password-confirm']]
      .forEach(([f, e]) => {
        document.getElementById(f)?.classList.remove('field-error');
        const el = document.getElementById(e);
        if (el) { el.textContent = ''; el.classList.remove('show'); }
      });
  }

  btn.addEventListener('click', async () => {
    clearAllErrors();
    let hasError = false;

    const email           = document.getElementById('email').value.trim();
    const password        = document.getElementById('password').value;
    const passwordConfirm = document.getElementById('password-confirm').value;

    if (!email) {
      setFieldError('email', 'err-email', 'メールアドレスを入力してください。'); hasError = true;
    } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setFieldError('email', 'err-email', '正しいメールアドレスを入力してください。'); hasError = true;
    }
    if (!password) {
      setFieldError('password', 'err-password', 'パスワードを入力してください。'); hasError = true;
    } else if (password.length < 8) {
      setFieldError('password', 'err-password', 'パスワードは8文字以上で設定してください。'); hasError = true;
    }
    if (!passwordConfirm) {
      setFieldError('password-confirm', 'err-password-confirm', '確認用パスワードを入力してください。'); hasError = true;
    } else if (password && password !== passwordConfirm) {
      setFieldError('password-confirm', 'err-password-confirm', 'パスワードが一致しません。'); hasError = true;
    }

    if (hasError) return;

    btn.disabled = true;
    btn.textContent = '送信中…';

    if (!_sb) {
      // Supabase未接続時はデモ表示
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('sent-email-display').textContent = email;
      document.getElementById('sent-area').classList.add('show');
      return;
    }

    const { error } = await _sb.auth.signUp({ email, password });

    if (error) {
      btn.disabled = false;
      btn.textContent = '登録メールを送信する';
      const MSG = {
        'User already registered': 'このメールアドレスはすでに登録されています。',
        'Password should be at least 6 characters': 'パスワードは6文字以上必要です。',
      };
      errorBox.textContent = MSG[error.message] ?? error.message;
      errorBox.classList.add('show');
      return;
    }

    // 送信完了表示
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('sent-email-display').textContent = email;
    document.getElementById('sent-area').classList.add('show');
  });
});
</script>
</body>
</html>
