<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽譜一覧 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .toolbar {
      display:flex; gap:var(--space-3); flex-wrap:wrap;
      align-items:center; margin-bottom:var(--space-6);
    }
    .toolbar input { flex:1; min-width:160px; }
    .score-table-wrap {
      border-radius:var(--radius-lg); overflow:hidden;
      border:1px solid var(--gray-200);
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .score-table-wrap .table { min-width:480px; }
    .part-tag {
      display:inline-flex; align-items:center;
      padding:2px 8px; border-radius:var(--radius-full);
      font-size:10px; font-weight:500;
      background:rgba(26,46,74,0.08); color:var(--navy-700); margin:2px;
    }
    /* スマホで非表示にする列 */
    @media (max-width: 640px) {
      .score-table-wrap .table { min-width: unset; width: 100%; }
      .col-composer, .col-pdf { display: none; }
      .col-title { max-width: 0; }
      /* ツールバーも縦積み */
      .toolbar { flex-direction: column; }
      .toolbar input,
      .toolbar select { width: 100%; max-width: none; }
    }
    .part-tag {
      display:inline-flex; align-items:center;
      padding:2px 8px; border-radius:var(--radius-full);
      font-size:10px; font-weight:500;
      background:rgba(26,46,74,0.08); color:var(--navy-700); margin:2px;
    }
    /* 詳細モーダル */
    .detail-dl { display:grid; grid-template-columns:90px 1fr; gap:var(--space-2) var(--space-4); font-size:var(--text-sm); }
    .detail-dl dt { color:var(--gray-500); }
    .detail-dl dd { color:var(--gray-800); font-weight:500; }
    .part-list { display:flex; flex-wrap:wrap; gap:var(--space-2); margin-top:var(--space-2); }
    /* PDFプレビュー */
    #modal-pdf .modal { max-width:860px; width:calc(100vw - 32px); }
    .pdf-iframe-wrap {
      width:100%; height:70vh; min-height:400px;
      border-radius:var(--radius-md); overflow:hidden;
      background:var(--gray-200); position:relative;
    }
    .pdf-iframe-wrap iframe { width:100%; height:100%; border:none; }
    .pdf-loading {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:var(--space-3); color:var(--gray-500); font-size:var(--text-sm);
    }
    @media(max-width:768px){
      .toolbar { flex-direction:column; }
      .toolbar input, .toolbar select { width:100%; max-width:none; }
      #modal-pdf .modal { width:calc(100vw - 16px); }
      .pdf-iframe-wrap { height:55vh; }
    }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">LIBRARY</p>
        <h1 class="page-header__title">楽譜一覧</h1>
      </div>
    </div>

    <!-- 検索ツールバー -->
    <div class="toolbar fade-in fade-in-1">
      <input type="text" id="search-input" class="form-control" placeholder="曲名・作曲者で検索…">
      <select id="filter-formation" class="form-control" style="max-width:200px;">
        <option value="">すべての編成</option>
        <option value="吹奏楽（大編成）">吹奏楽（大編成）</option>
        <option value="吹奏楽（中編成）">吹奏楽（中編成）</option>
        <option value="吹奏楽（小編成）">吹奏楽（小編成）</option>
        <option value="フレックス">フレックス</option>
        <option value="アンサンブル">アンサンブル</option>
        <option value="ソロ">ソロ</option>
        <option value="その他">その他</option>
      </select>
      <select id="filter-public" class="form-control" style="max-width:160px;">
        <option value="">すべて表示</option>
        <option value="1">PDF公開中のみ</option>
      </select>
    </div>

    <!-- 楽譜テーブル -->
    <div class="score-table-wrap fade-in fade-in-2">
      <table class="table">
        <thead>
          <tr>
            <th style="width:72px;">楽譜番号</th>
            <th>曲名</th>
            <th class="col-composer">作曲者／アーティスト</th>
            <th class="col-composer">編成</th>
            <th class="col-pdf" style="width:80px;">PDF</th>
            <th style="width:72px;"></th>
          </tr>
        </thead>
        <tbody id="scores-tbody">
          <tr><td colspan="6" style="text-align:center;padding:var(--space-10);">
            <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>
          </td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- ── 詳細モーダル ── -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <h2 class="modal__title" id="detail-title">—</h2>
      <button class="modal__close" onclick="closeModal('modal-detail')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" id="detail-body"></div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-detail')">閉じる</button>
      <button class="btn btn-primary" id="btn-open-lending" onclick="openLendingModal(currentDetailScoreId)" style="display:none;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="15" height="15">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/>
        </svg>
        貸出申請
      </button>
    </div>
  </div>
</div>

<!-- ── PDFプレビューモーダル ── -->
<div class="modal-overlay" id="modal-pdf">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="pdf-modal-title">—</h2>
      <button class="modal__close" onclick="closeModal('modal-pdf')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" style="padding:var(--space-4);">
      <div class="pdf-iframe-wrap">
        <div class="pdf-loading" id="pdf-loading">
          <div class="loading-spinner"></div>
          <span>PDFを読み込んでいます…</span>
        </div>
        <iframe id="pdf-iframe" src="" title="PDF" style="display:none;"
          onload="document.getElementById('pdf-loading').style.display='none';this.style.display='block';">
        </iframe>
      </div>
      <p style="font-size:var(--text-xs);color:var(--gray-400);margin-top:var(--space-2);text-align:center;">
        ブラウザのPDFビューア内の印刷ボタン、またはCtrl+P（⌘+P）で印刷できます。
      </p>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-pdf')">閉じる</button>
      <button class="btn btn-primary" id="pdf-download-btn">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12M12 16.5V3"/></svg>
        ダウンロード
      </button>
    </div>
  </div>
</div>

<!-- ── 貸出申請モーダル ── -->
<div class="modal-overlay" id="modal-lending">
  <div class="modal" style="max-width:520px;">
    <div class="modal__header">
      <h2 class="modal__title" id="lending-modal-title">原本貸出申請</h2>
      <button class="modal__close" onclick="closeModal('modal-lending')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-4);">
        貸出を希望するパートの楽譜にチェックを付けて申請してください。蔵書委員・GMに申請メールが送信されます。
      </p>
      <div id="lending-parts-list" style="display:flex;flex-direction:column;gap:var(--space-2);max-height:280px;overflow-y:auto;border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:var(--space-3);background:var(--gray-100);margin-bottom:var(--space-4);"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-lending')">キャンセル</button>
      <button class="btn btn-gold" id="btn-submit-lending">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        原本貸出を申請
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script>
// ══════════════════════════════════════
//  状態
// ══════════════════════════════════════
let allScores = [];

// ══════════════════════════════════════
//  XSS対策
// ══════════════════════════════════════
function escHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ══════════════════════════════════════
//  公開状態の実効判定
//  手動公開 OR スケジュール期間内 → true
// ══════════════════════════════════════
function isEffectivelyPublic(score) {
  if (score.is_public) return true;
  const now   = new Date();
  const start = score.publish_start ? new Date(score.publish_start) : null;
  const end   = score.publish_end   ? new Date(score.publish_end)   : null;
  if (!start && !end) return false;
  const afterStart = start ? now >= start : true;
  const beforeEnd  = end   ? now <= end   : true;
  return afterStart && beforeEnd;
}

// ══════════════════════════════════════
//  テーブル描画
// ══════════════════════════════════════
function renderTable() {
  const kw        = document.getElementById('search-input').value.toLowerCase();
  const formation = document.getElementById('filter-formation').value;
  const pubOnly   = document.getElementById('filter-public').value === '1';

  const filtered = allScores.filter(s => {
    const text = `${s.title_ja}${s.title_en}${s.title_kana}${s.composer}${s.artist}`.toLowerCase();
    if (kw        && !text.includes(kw))          return false;
    if (formation && s.formation !== formation)    return false;
    if (pubOnly   && !isEffectivelyPublic(s))      return false;
    return true;
  });

  const tbody = document.getElementById('scores-tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">該当する楽譜がありません</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(s => `
    <tr>
      <td style="font-family:var(--font-display);font-weight:600;color:var(--gray-500);font-size:var(--text-sm);">
        ${escHtml(String(s.score_number))}
      </td>
      <td>
        <div style="font-weight:700;color:var(--navy-800);">${escHtml(s.title_ja)}</div>
        ${s.title_en ? `<div style="font-size:var(--text-xs);color:var(--gray-400);">${escHtml(s.title_en)}</div>` : ''}
      </td>
      <td class="col-composer" style="font-size:var(--text-sm);color:var(--gray-600);">
        ${escHtml(s.composer || s.artist || '—')}
      </td>
      <td class="col-composer">
        ${s.formation ? `<span class="badge badge-navy">${escHtml(s.formation)}</span>` : '—'}
      </td>
      <td class="col-pdf" style="text-align:center;">
        ${isEffectivelyPublic(s)
          ? `<span class="badge badge-success">公開中</span>`
          : `<span class="badge" style="background:var(--gray-200);color:var(--gray-500);">非公開</span>`}
      </td>
      <td>
        <button class="btn btn-sm btn-outline" onclick="openDetail('${s.id}')">詳細</button>
      </td>
    </tr>
  `).join('');
}

// ══════════════════════════════════════
//  担当楽器 → 照合キーワードマッピング
// ══════════════════════════════════════
const PART_KEYWORDS = {
  conductor:   ['score', 'conductor'],
  piccolo:       ['piccolo','fl','picc','flute'],
  flute:       ['fl','piccolo','picc','flute'],
  oboe:        ['oboe', 'ob'],
  clarinet:    ['clarinet', 'cl','BassCl'],
  bassoon:     ['bassoon', 'fg', 'bn'],
  ssaxophone:   ['saxophone', 'sax', 'soprano sax','alto sax', 'tenor sax', 'baritone sax'],
  asaxophone:   ['saxophone', 'sax', 'soprano sax','alto sax', 'tenor sax', 'baritone sax'],
  tsaxophone:   ['saxophone', 'sax', 'soprano sax','alto sax', 'tenor sax', 'baritone sax'],
  bsaxophone:   ['saxophone', 'sax', 'soprano sax','alto sax', 'tenor sax', 'baritone sax'],
  horn:        ['horn', 'hn', 'hr','EsHorn','FHorn'],
  trumpet:     ['trumpet', 'tp', 'tpt', 'tr'],
  trombone:    ['trombone', 'tb', 'tbn','basstb'],
  euphonium:   ['euphonium', 'euph', 'baritone', 'bar'],
  tuba:        ['tuba', 'tu'],
  percussion:  ['percussion', 'perc', 'dr', 'drum', 'timp', 'xyl', 'mar','glock','BD','snare','symbal','Pf','drums','Timpani'],
  contrabass:  ['contrabass', 'cb', 'string bass','SB','S.Bass','E.Bass'],
  piano:       ['piano', 'pf', 'pno'],
};

// パート名（file_nameから曲名_を除いた部分）が
// ユーザーの担当楽器に関連するか判定する
function isAccessiblePdf(partName, userPart) {
  if (!userPart) return false;
  const lower = partName.toLowerCase();

  // score（指揮者譜）は常に閲覧可
  if (lower === 'score' || lower.startsWith('score')) return true;

  // ユーザーの担当楽器に対応するキーワード群で部分一致チェック
  const keywords = PART_KEYWORDS[userPart] ?? [];
  return keywords.some(kw => lower.includes(kw.toLowerCase()));
}

// file_name から「曲名_」プレフィックスを除去してパート名を取得
function extractPartName(fileName, titleJa) {
  const prefix = `${titleJa}_`;
  if (fileName.startsWith(prefix)) {
    return fileName.slice(prefix.length);
  }
  // プレフィックスが一致しない場合はfile_nameをそのまま返す
  return fileName;
}

// ══════════════════════════════════════
//  詳細モーダル
// ══════════════════════════════════════
async function openDetail(id) {
  const s = allScores.find(x => x.id === id);
  if (!s) return;

  // PDFを取得
  let pdfs = [];
  if (_sb) {
    const { data: pdfsData } = await _sb
      .from('score_pdfs')
      .select('*')
      .eq('score_id', id)
      .order('uploaded_at');
    pdfs = pdfsData ?? [];
  }

  // ログインユーザーの担当楽器を取得
  const sessionUser = getSessionUser();
  const userPart = sessionUser?.part ?? null;

  // 各PDFのパート名を抽出（曲名_を除去）
  const pdfsWithPartName = pdfs.map(pdf => ({
    ...pdf,
    partName: extractPartName(pdf.file_name, s.title_ja),
  }));

  // 閲覧可能なPDFを絞り込み（実効公開中かつログイン済みかつ担当楽器一致）
  const accessiblePdfs = (isEffectivelyPublic(s) && userPart)
    ? pdfsWithPartName.filter(pdf => isAccessiblePdf(pdf.partName, userPart))
    : [];

  document.getElementById('detail-title').textContent = s.title_ja;
  document.getElementById('detail-body').innerHTML = `
    <dl class="detail-dl mb-6">
      <dt>楽譜番号</dt><dd>${escHtml(String(s.score_number))}</dd>
      ${s.title_en   ? `<dt>曲名（英語）</dt><dd>${escHtml(s.title_en)}</dd>`   : ''}
      ${s.title_kana ? `<dt>曲名（読み）</dt><dd>${escHtml(s.title_kana)}</dd>` : ''}
      ${s.composer   ? `<dt>作曲者</dt><dd>${escHtml(s.composer)}</dd>`         : ''}
      ${s.artist     ? `<dt>アーティスト</dt><dd>${escHtml(s.artist)}</dd>`     : ''}
      ${s.formation  ? `<dt>編成</dt><dd>${escHtml(s.formation)}</dd>`          : ''}
      ${s.notes      ? `<dt>備考</dt><dd style="white-space:pre-wrap;">${escHtml(s.notes)}</dd>` : ''}
    </dl>

    ${pdfsWithPartName.length > 0 ? `
      <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-3);">パート一覧</p>
      <div class="part-list mb-6">
        ${pdfsWithPartName.map(pdf => `<span class="part-tag">${escHtml(pdf.partName)}</span>`).join('')}
      </div>
    ` : ''}

    ${!isEffectivelyPublic(s) ? `
      <div class="alert alert-info" style="margin-top:var(--space-4);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
        <span>この楽譜のPDFは現在非公開です。</span>
      </div>
    ` : !userPart ? `
      <div class="alert alert-info" style="margin-top:var(--space-4);">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
        <span>PDFを閲覧するにはログインが必要です。</span>
      </div>
    ` : accessiblePdfs.length > 0 ? `
      <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-3);">パート譜 PDF</p>
      <div>
        ${s.no_convenience_print ? `
          <div class="alert" style="background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.3);color:var(--danger);margin-bottom:var(--space-4);">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18" style="flex-shrink:0;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            <span style="font-size:var(--text-sm);">この楽譜は<strong>コンビニ印刷不可</strong>です。印刷する場合は必ず自宅プリンターを使用してください。</span>
          </div>
        ` : ''}
        ${accessiblePdfs.map(pdf => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) 0;border-bottom:1px solid var(--gray-200);">
            <span style="font-size:var(--text-sm);font-weight:500;color:var(--navy-800);">${escHtml(pdf.partName)}</span>
            <button class="btn btn-sm btn-primary"
              onclick="openPdfPreview('${escHtml(pdf.storage_path)}','${escHtml(pdf.partName)}',${s.no_convenience_print ? 'true' : 'false'})">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="13" height="13">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.641 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
              開く・印刷
            </button>
          </div>
        `).join('')}
      </div>
    ` : `
      <p style="font-size:var(--text-sm);color:var(--gray-400);padding:var(--space-3) 0;">
        あなたのパートのPDFはありません。
      </p>
    `}
  `;

  openModal('modal-detail');
}

// ══════════════════════════════════════
//  PDFプレビュー
// ══════════════════════════════════════

// コンビニ印刷不可の警告モーダルを表示してから PDF を開く
function openPdfPreview(storagePath, fileName, noConveniencePrint = false) {
  if (noConveniencePrint) {
    // 警告モーダルを動的生成（なければ）
    if (!document.getElementById('modal-no-convenience')) {
      const el = document.createElement('div');
      el.className = 'modal-overlay';
      el.id = 'modal-no-convenience';
      el.innerHTML = `
        <div class="modal" style="max-width:440px;">
          <div class="modal__header" style="background:var(--danger);">
            <h2 class="modal__title" style="display:flex;align-items:center;gap:var(--space-2);">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="22" height="22"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
              コンビニ印刷不可
            </h2>
            <button class="modal__close" onclick="closeModal('modal-no-convenience')">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="modal__body">
            <p style="font-size:var(--text-base);font-weight:700;color:var(--navy-800);margin-bottom:var(--space-4);">
              この楽譜はコンビニ印刷が禁止されています。
            </p>
            <p style="font-size:var(--text-sm);color:var(--gray-600);line-height:1.8;margin-bottom:var(--space-3);">
              著作権上の理由により、コンビニ（セブン-イレブン・ローソン・ファミリーマート等）のマルチコピー機での印刷はご遠慮ください。
            </p>
            <p style="font-size:var(--text-sm);color:var(--gray-600);line-height:1.8;">
              印刷が必要な場合は、<strong>自宅のプリンター</strong>のみご使用ください。
            </p>
            <div style="margin-top:var(--space-5);padding:var(--space-4);background:rgba(192,57,43,0.06);border-radius:var(--radius-md);border:1px solid rgba(192,57,43,0.2);">
              <p style="font-size:var(--text-xs);color:var(--danger);font-weight:600;">⚠ この制限に違反した場合、著作権法上の問題となる可能性があります。</p>
            </div>
          </div>
          <div class="modal__footer">
            <button class="btn btn-outline" onclick="closeModal('modal-no-convenience')">キャンセル</button>
            <button class="btn btn-danger" id="btn-no-conv-proceed">内容を確認しました。PDFを開く</button>
          </div>
        </div>`;
      el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); });
      document.body.appendChild(el);
    }

    // 「PDFを開く」ボタンにその都度ハンドラを上書き
    document.getElementById('btn-no-conv-proceed').onclick = () => {
      closeModal('modal-no-convenience');
      _doOpenPdfPreview(storagePath, fileName);
    };

    openModal('modal-no-convenience');
    return;
  }

  // 制限なし → そのまま開く
  _doOpenPdfPreview(storagePath, fileName);
}

async function _doOpenPdfPreview(storagePath, fileName) {
  if (!_sb) { showToast('Supabase未接続です', 'error'); return; }

  document.getElementById('pdf-loading').style.display = 'flex';
  const iframe = document.getElementById('pdf-iframe');
  iframe.style.display = 'none';
  iframe.src = '';
  document.getElementById('pdf-modal-title').textContent = fileName;

  // 署名付きURL取得（60分有効）
  const { data, error } = await _sb.storage
    .from('scores')
    .createSignedUrl(storagePath, 3600);

  if (error || !data?.signedUrl) {
    showToast('PDFの取得に失敗しました', 'error');
    return;
  }

  const signedUrl = data.signedUrl;
  iframe.src = signedUrl;

  document.getElementById('pdf-download-btn').onclick = () => {
    const a = document.createElement('a');
    a.href = signedUrl;
    a.download = fileName;
    a.click();
  };

  closeModal('modal-detail');
  openModal('modal-pdf');
}

// ── 貸出申請関連 ──
let currentDetailScoreId = null;
let currentDetailPdfs    = [];

// openDetail を修正して currentDetailScoreId を記録する
const _origOpenDetail = openDetail;
openDetail = async function(id) {
  currentDetailScoreId = id;
  await _origOpenDetail(id);

  // パートが存在し、公開中なら貸出ボタンを表示
  const s = allScores.find(x => x.id === id);
  const btn = document.getElementById('btn-open-lending');
  if (btn && s) btn.style.display = 'inline-flex';
};

async function openLendingModal(scoreId) {
  const s = allScores.find(x => x.id === scoreId);
  if (!s || !_sb) return;

  document.getElementById('lending-modal-title').textContent = `原本貸出申請 — ${s.title_ja}`;

  // PDFパート一覧を取得
  const { data: pdfs } = await _sb.from('score_pdfs').select('*').eq('score_id', scoreId).order('uploaded_at');
  const parts = (pdfs ?? []).map(p => {
    const prefix = `${s.title_ja}_`;
    return p.file_name.startsWith(prefix) ? p.file_name.slice(prefix.length) : p.file_name;
  });

  const listEl = document.getElementById('lending-parts-list');
  if (parts.length === 0) {
    listEl.innerHTML = '<p style="font-size:var(--text-sm);color:var(--gray-400);">登録されているパートがありません。</p>';
  } else {
    listEl.innerHTML = parts.map((p, i) => `
      <label style="display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-3);background:var(--white);border-radius:var(--radius-sm);cursor:pointer;">
        <input type="checkbox" class="lending-part-cb" value="${escHtml(p)}" style="accent-color:var(--navy-600);width:16px;height:16px;">
        <span style="font-size:var(--text-sm);color:var(--navy-800);">${escHtml(p)}</span>
      </label>`).join('');
  }

  closeModal('modal-detail');
  openModal('modal-lending');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-submit-lending')?.addEventListener('click', submitLending);
});

async function submitLending() {
  const scoreId = currentDetailScoreId;
  const s = allScores.find(x => x.id === scoreId);
  if (!s || !_sb) return;

  const checked = [...document.querySelectorAll('.lending-part-cb:checked')].map(el => el.value);
  if (checked.length === 0) { showToast('パートを1つ以上選択してください', 'error'); return; }

  const sessionUser = getSessionUser();
  if (!sessionUser) { showToast('ログインが必要です', 'error'); return; }

  // Supabaseに申請レコードを作成
  const { data: profile } = await _sb.from('profiles').select('last_name,first_name,email').eq('id', sessionUser.id).single();
  const requesterName  = profile ? `${profile.last_name}${profile.first_name}` : sessionUser.name;
  const requesterEmail = profile?.email ?? '';

  const { error } = await _sb.from('score_lending_requests').insert({
    score_id:       scoreId,
    score_title:    s.title_ja,
    requester_id:   sessionUser.id,
    requester_name: requesterName,
    requester_email: requesterEmail,
    parts:          checked,
    status:         'pending',
  });
  if (error) { showToast('申請の保存に失敗しました: ' + error.message, 'error'); return; }

  // GM・蔵書委員のメールアドレスを取得して mailto を開く
  const { data: admins } = await _sb.from('profiles').select('email').filter('roles', 'cs', '{"gm","librarian"}');
  const toEmails = (admins ?? []).map(a => a.email).filter(Boolean);

  const subject = encodeURIComponent(`【楽譜原本貸出申請】${s.title_ja}`);
  const body    = encodeURIComponent(
    `${requesterName} さんから楽譜原本の貸出申請がありました。\n\n` +
    `■ 楽曲名：${s.title_ja}\n` +
    `■ 申請パート：${checked.join('、')}\n` +
    `■ 申請者：${requesterName}（${requesterEmail}）\n\n` +
    `楽譜管理（編集）ページの「貸出・返却受付」タブから承認してください。`
  );

  if (toEmails.length > 0) {
    window.location.href = `mailto:${encodeURIComponent(toEmails.join(','))}?subject=${subject}&body=${body}`;
  }

  closeModal('modal-lending');
  showToast('貸出申請を送信しました', 'success');
}

// ══════════════════════════════════════
//  データ読み込み
// ══════════════════════════════════════
async function loadScores() {
  if (!_sb) {
    document.getElementById('scores-tbody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">Supabase未接続のためデータを取得できません。</td></tr>`;
    return;
  }

  const { data, error } = await _sb
    .from('scores2')
    .select('*')
    .order('score_number', { ascending: true });

  if (error) {
    console.error('[HighasuiDX] 楽譜一覧取得エラー:', error.message);
    document.getElementById('scores-tbody').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:var(--space-10);color:var(--danger);">データの取得に失敗しました。</td></tr>`;
    return;
  }

  allScores = data ?? [];
  renderTable();
}

// ══════════════════════════════════════
//  初期化
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('search-input').addEventListener('input', renderTable);
  document.getElementById('filter-formation').addEventListener('change', renderTable);
  document.getElementById('filter-public').addEventListener('change', renderTable);
  await loadScores();

  // URLパラメータに id が指定されている場合は詳細モーダルを自動オープン
  const params = new URLSearchParams(window.location.search);
  const targetId = params.get('id');
  if (targetId) {
    await openDetail(targetId);
  }
});
</script>
