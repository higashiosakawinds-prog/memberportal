<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>楽譜管理 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── ツールバー ── */
    .toolbar {
      display:flex; gap:var(--space-3); flex-wrap:wrap;
      align-items:center; margin-bottom:var(--space-6);
    }
    .toolbar input { flex:1; min-width:160px; }

    /* ── テーブル ── */
    .score-table-wrap { border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--gray-200); }
    .part-tag {
      display:inline-flex; align-items:center;
      padding:2px 8px; border-radius:var(--radius-full);
      font-size:10px; font-weight:500;
      background:rgba(26,46,74,0.08); color:var(--navy-700); margin:2px;
    }

    /* ── 権限なし通知 ── */
    .readonly-notice {
      display:flex; gap:var(--space-3); align-items:flex-start;
      background:var(--gold-100); border:1px solid var(--gold-200);
      border-radius:var(--radius-md); padding:var(--space-3) var(--space-4);
      font-size:var(--text-sm); color:#8a6f1e; margin-bottom:var(--space-6);
    }
    .readonly-notice svg { flex-shrink:0; margin-top:2px; }

    /* ── 詳細モーダル パートリスト ── */
    .part-pdf-row {
      display:flex; align-items:center; gap:var(--space-3);
      padding:var(--space-3) 0; border-bottom:1px solid var(--gray-200);
    }
    .part-pdf-row:last-child { border-bottom:none; }
    .part-pdf-row__label {
      flex:1; font-size:var(--text-sm); font-weight:500; color:var(--navy-800);
    }
    .part-pdf-row__filename { font-size:var(--text-xs); color:var(--gray-400); }
    .my-part-badge {
      font-size:10px; background:rgba(201,168,76,0.18);
      color:#8a6f1e; padding:1px 7px; border-radius:var(--radius-full);
      font-weight:600; white-space:nowrap;
    }

    /* ── PDFプレビューモーダル ── */
    #modal-pdf .modal { max-width:860px; width:calc(100vw - 32px); }
    .pdf-iframe-wrap {
      width:100%; height:70vh; min-height:400px;
      border-radius:var(--radius-md); overflow:hidden;
      background:var(--gray-200); position:relative;
    }
    .pdf-iframe-wrap iframe { width:100%; height:100%; border:none; }
    .pdf-iframe-loading {
      position:absolute; inset:0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:var(--space-3); color:var(--gray-500); font-size:var(--text-sm);
    }

    /* ── 登録モーダル ── */
    .form-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }

    @media(max-width:768px){
      .toolbar { flex-direction:column; }
      .toolbar input, .toolbar select { width:100%; max-width:none; }
      .score-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
      .score-table-wrap .table { min-width:520px; }
      .form-grid-2 { grid-template-columns:1fr; }
      #modal-pdf .modal { width:calc(100vw - 16px); }
      .pdf-iframe-wrap { height:55vh; }
    }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <!-- ページヘッダー -->
    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">LIBRARY</p>
        <h1 class="page-header__title">楽譜管理</h1>
      </div>
      <div class="page-header__actions" id="page-actions">
        <!-- 権限に応じてJSで挿入 -->
      </div>
    </div>

    <!-- 権限なし通知（閲覧者用） -->
    <div class="readonly-notice fade-in" id="readonly-notice" style="display:none;">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
      </svg>
      <span>楽譜の閲覧・印刷が行えます。配布設定・楽譜の追加は管理者または蔵書委員が行います。</span>
    </div>

    <!-- 検索ツールバー -->
    <div class="toolbar fade-in fade-in-1">
      <input type="text" id="search-input" class="form-control" placeholder="曲名で検索…">
      <select id="filter-part" class="form-control" style="max-width:180px;">
        <option value="">すべてのパート</option>
        <option value="conductor">指揮者譜</option>
        <option value="flute">フルート</option>
        <option value="oboe">オーボエ</option>
        <option value="clarinet">クラリネット</option>
        <option value="bassoon">ファゴット</option>
        <option value="saxophone">サクソフォーン</option>
        <option value="horn">ホルン</option>
        <option value="trumpet">トランペット</option>
        <option value="trombone">トロンボーン</option>
        <option value="euphonium">ユーフォニアム</option>
        <option value="tuba">テューバ</option>
        <option value="percussion">打楽器</option>
        <option value="contrabass">コントラバス</option>
      </select>
      <select id="filter-dist" class="form-control" style="max-width:160px;">
        <option value="">配布状況すべて</option>
        <option value="1">配布中のみ</option>
        <option value="0">未配布のみ</option>
      </select>
      <button class="btn btn-outline btn-sm" id="btn-reload" title="最新データを取得">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
        更新
      </button>
    </div>

    <!-- 楽譜テーブル -->
    <div class="score-table-wrap fade-in fade-in-2">
      <table class="table">
        <thead>
          <tr>
            <th>曲名</th>
            <th>登録日</th>
            <th>パート数</th>
            <th>配布状況</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="scores-tbody">
          <tr><td colspan="5" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">
            <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>読み込み中…
          </td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- ══════════════════════════════════════
     楽曲詳細・パートPDFモーダル（全員閲覧可）
     ══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal" style="max-width:600px;">
    <div class="modal__header">
      <h2 class="modal__title" id="detail-title">—</h2>
      <button class="modal__close" onclick="closeModal('modal-detail')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" id="detail-body"></div>
    <div class="modal__footer" id="detail-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-detail')">閉じる</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     PDFプレビューモーダル（ブラウザ内で表示・印刷）
     ══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-pdf">
  <div class="modal">
    <div class="modal__header">
      <h2 class="modal__title" id="pdf-modal-title">—</h2>
      <button class="modal__close" onclick="closeModal('modal-pdf')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" style="padding:var(--space-4);">
      <div class="pdf-iframe-wrap" id="pdf-iframe-wrap">
        <div class="pdf-iframe-loading" id="pdf-loading">
          <div class="loading-spinner"></div>
          <span>PDFを読み込んでいます…</span>
        </div>
        <iframe id="pdf-iframe" src="" title="PDF" style="display:none;"
          onload="document.getElementById('pdf-loading').style.display='none';this.style.display='block';">
        </iframe>
      </div>
      <p style="font-size:var(--text-xs);color:var(--gray-400);margin-top:var(--space-2);text-align:center;">
        ブラウザのPDFビューア内の印刷ボタン、またはCtrl+P（⌘+P）で印刷できます。
      </p>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-pdf')">閉じる</button>
      <a id="pdf-open-link" href="#" target="_blank" rel="noopener" class="btn btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="15" height="15"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
        別タブで開く
      </a>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     楽譜登録モーダル（管理者・蔵書委員のみ）
     ══════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add">
  <div class="modal" style="max-width:600px;">
    <div class="modal__header">
      <h2 class="modal__title">楽譜情報を登録</h2>
      <button class="modal__close" onclick="closeModal('modal-add')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <!-- GASとの連携説明 -->
      <div class="alert alert-info mb-6" style="font-size:var(--text-xs);line-height:1.7;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
        <div>
          <strong>PDFファイルはGASで管理されます。</strong><br>
          楽譜PDFのアップロードはGoogle Apps Script側で行ってください。<br>
          ここでは配布設定・作曲者情報などの補足情報を登録します。
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">曲名 <span class="required">*</span></label>
        <input type="text" id="add-title" class="form-control" placeholder="例：吹奏楽のための第一組曲">
        <span class="form-hint">GASのスプレッドシートの曲名と完全一致させてください。</span>
      </div>
      <div class="form-grid-2">
        <div class="form-group">
          <label class="form-label">作曲者</label>
          <input type="text" id="add-composer" class="form-control" placeholder="例：G.ホルスト">
        </div>
        <div class="form-group">
          <label class="form-label">編曲者</label>
          <input type="text" id="add-arranger" class="form-control" placeholder="例：（原曲のまま）">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">備考</label>
        <textarea id="add-notes" class="form-control" rows="2" placeholder="演奏会用、選曲候補 など"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:var(--space-3);cursor:pointer;">
          <input type="checkbox" id="add-distributed" style="width:18px;height:18px;accent-color:var(--gold-500);">
          <span class="form-label" style="margin:0;">今すぐ配布を開始する</span>
        </label>
      </div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-add')">キャンセル</button>
      <button class="btn btn-gold" id="btn-save-score">保存する</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/scorelib-fetch.js"></script>
<script src="../js/common.js"></script>
<script>
// ═══════════════════════════════════════════
//  パートラベルマップ（表示用）
// ═══════════════════════════════════════════
const PART_LABEL_MAP = {
  conductor:'指揮者譜', flute:'フルート', oboe:'オーボエ', clarinet:'クラリネット',
  bassoon:'ファゴット', saxophone:'サクソフォーン', horn:'ホルン', trumpet:'トランペット',
  trombone:'トロンボーン', euphonium:'ユーフォニアム', tuba:'テューバ',
  percussion:'打楽器', contrabass:'コントラバス', other:'その他',
};

// ═══════════════════════════════════════════
//  状態
// ═══════════════════════════════════════════
let allScores = [];  // 内部形式の楽曲配列（mergeScoresData の戻り値）
let isEditor  = false;

// ═══════════════════════════════════════════
//  権限チェック
// ═══════════════════════════════════════════
function checkEditorRole() {
  const user = getSessionUser();
  if (!user) return false;
  const roles = Array.isArray(user.roles) ? user.roles : [user.role].filter(Boolean);
  return roles.some(r => ['admin', 'librarian'].includes(r));
}

// ═══════════════════════════════════════════
//  テーブル描画
// ═══════════════════════════════════════════
function renderTable() {
  const kw   = document.getElementById('search-input').value.toLowerCase();
  const part = document.getElementById('filter-part').value;
  const dist = document.getElementById('filter-dist').value;

  const filtered = allScores.filter(s => {
    if (kw   && !s.title.toLowerCase().includes(kw)) return false;
    if (part && !s.parts.includes(part))              return false;
    if (dist === '1' && !s.is_distributed)            return false;
    if (dist === '0' &&  s.is_distributed)            return false;
    return true;
  });

  const tbody = document.getElementById('scores-tbody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">
      該当する楽譜がありません
    </td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(s => `
    <tr style="cursor:pointer;" onclick="openDetail('${s.id}')">
      <td style="font-weight:600;color:var(--navy-800);">${s.title}</td>
      <td style="font-size:var(--text-xs);color:var(--gray-500);">
        ${s.created_at ? s.created_at.slice(0,10) : '—'}
      </td>
      <td>${s.gasparts?.length ?? s.parts.length}パート</td>
      <td>${s.is_distributed
        ? '<span class="badge badge-success">配布中</span>'
        : '<span class="badge badge-navy">未配布</span>'}</td>
      <td>
        <button class="btn btn-sm btn-outline"
          onclick="event.stopPropagation();openDetail('${s.id}')">詳細</button>
      </td>
    </tr>
  `).join('');
}

// ═══════════════════════════════════════════
//  詳細モーダル
// ═══════════════════════════════════════════
function openDetail(id) {
  const s = allScores.find(x => x.id === id);
  if (!s) return;

  const user     = getSessionUser();
  const userPart = user?.part ?? null;
  const gasparts = s.gasparts ?? [];

  // パートリスト（PDFが紐づいているもの）
  const pdfRows = gasparts.length > 0
    ? gasparts.map(p => {
        const labelDisp = PART_LABEL_MAP[p.key] ?? p.name;
        const isMyPart  = p.key === userPart;
        const hasFile   = !!p.fileId;

        return `
          <div class="part-pdf-row">
            <div style="flex:1;min-width:0;">
              <div class="part-pdf-row__label">
                ${labelDisp}
                ${isMyPart ? '<span class="my-part-badge">あなたのパート</span>' : ''}
              </div>
              ${p.fileName
                ? `<div class="part-pdf-row__filename">${p.fileName}</div>`
                : ''}
            </div>
            ${hasFile
              ? `<button class="btn btn-sm btn-primary"
                   onclick="openPdfPreview('${p.fileId}','${s.title} — ${labelDisp}')">
                   <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="13" height="13">
                     <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.641 0-8.573-3.007-9.963-7.178z"/>
                     <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                   </svg>
                   開く・印刷
                 </button>`
              : `<span style="font-size:var(--text-xs);color:var(--gray-400);">PDF未登録</span>`}
          </div>
        `;
      }).join('')
    : `<p style="font-size:var(--text-sm);color:var(--gray-400);padding:var(--space-4) 0;">
         GASにパートデータがありません。スプレッドシートを確認してください。
       </p>`;

  document.getElementById('detail-title').textContent = s.title;
  document.getElementById('detail-body').innerHTML = `
    ${s.composer || s.arranger || s.notes ? `
      <dl style="display:grid;grid-template-columns:80px 1fr;gap:var(--space-2) var(--space-4);font-size:var(--text-sm);margin-bottom:var(--space-5);">
        ${s.composer ? `<dt style="color:var(--gray-500);">作曲者</dt><dd>${s.composer}</dd>` : ''}
        ${s.arranger ? `<dt style="color:var(--gray-500);">編曲者</dt><dd>${s.arranger}</dd>` : ''}
        ${s.notes    ? `<dt style="color:var(--gray-500);">備考</dt><dd>${s.notes}</dd>`    : ''}
      </dl>
    ` : ''}
    <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-3);">
      パート譜 PDF
    </p>
    ${pdfRows}
  `;

  // フッターボタン（編集権限あり：配布切替・削除）
  const footer = document.getElementById('detail-footer');
  footer.innerHTML = isEditor
    ? `<button class="btn btn-danger btn-sm" onclick="deleteScore('${id}')">削除</button>
       <span style="flex:1;"></span>
       <button class="btn btn-outline" onclick="closeModal('modal-detail')">閉じる</button>
       <button class="btn btn-primary" onclick="toggleDistribution('${id}')">
         ${s.is_distributed ? '配布を停止する' : '配布を開始する'}
       </button>`
    : `<button class="btn btn-outline" onclick="closeModal('modal-detail')">閉じる</button>`;

  openModal('modal-detail');
}

// ═══════════════════════════════════════════
//  PDFプレビューモーダル
// ═══════════════════════════════════════════
function openPdfPreview(fileId, label) {
  const previewUrl = getPdfPreviewUrl(fileId);
  const openUrl    = `https://drive.google.com/file/d/${fileId}/view`;

  // ローディング状態をリセット
  document.getElementById('pdf-loading').style.display = 'flex';
  const iframe = document.getElementById('pdf-iframe');
  iframe.style.display = 'none';
  iframe.src = '';

  document.getElementById('pdf-modal-title').textContent = label;
  document.getElementById('pdf-open-link').href = openUrl;

  // iframeをセット（loadイベントでローディングを非表示）
  iframe.src = previewUrl;

  closeModal('modal-detail');
  openModal('modal-pdf');
}

// ═══════════════════════════════════════════
//  配布切替・削除（編集者のみ呼び出し可）
// ═══════════════════════════════════════════
async function toggleDistribution(id) {
  const s = allScores.find(x => x.id === id);
  if (!s) return;
  s.is_distributed = !s.is_distributed;

  // Supabaseにsupabase IDが存在する場合は更新、なければ新規insert
  if (_sb) {
    if (s.supaId) {
      await _sb.from('scores').update({ is_distributed: s.is_distributed }).eq('id', s.supaId);
    } else {
      // GASにしかない曲をSupabaseに新規登録
      const { data } = await _sb.from('scores').insert({
        title: s.title, is_distributed: s.is_distributed,
        composer: s.composer, arranger: s.arranger, notes: s.notes,
      }).select().single();
      if (data) s.supaId = data.id;
    }
  }

  showToast(
    s.is_distributed ? '配布を開始しました' : '配布を停止しました',
    s.is_distributed ? 'success' : 'default'
  );
  closeModal('modal-detail');
  renderTable();
}

async function deleteScore(id) {
  if (!confirm('この楽譜のSupabase登録情報を削除しますか？\n※Google Drive・GASのデータは削除されません。')) return;
  const s = allScores.find(x => x.id === id);
  if (s?.supaId && _sb) await _sb.from('scores').delete().eq('id', s.supaId);
  // GASデータは残るが is_distributed を false に戻す
  if (s) s.is_distributed = false;
  showToast('登録情報を削除しました', 'success');
  closeModal('modal-detail');
  renderTable();
}

// ═══════════════════════════════════════════
//  楽譜情報をSupabaseに保存（補足情報登録）
// ═══════════════════════════════════════════
document.getElementById('btn-save-score').addEventListener('click', async () => {
  const title = document.getElementById('add-title').value.trim();
  if (!title) { showToast('曲名を入力してください', 'error'); return; }

  const btn = document.getElementById('btn-save-score');
  btn.disabled = true; btn.textContent = '保存中…';

  const payload = {
    title,
    composer:       document.getElementById('add-composer').value.trim(),
    arranger:       document.getElementById('add-arranger').value.trim(),
    notes:          document.getElementById('add-notes').value.trim(),
    is_distributed: document.getElementById('add-distributed').checked,
  };

  if (_sb) {
    // 既存レコードがあればupdate、なければinsert
    const { data: existing } = await _sb.from('scores').select('id').eq('title', title).maybeSingle();
    let error;
    if (existing) {
      ({ error } = await _sb.from('scores').update(payload).eq('id', existing.id));
    } else {
      ({ error } = await _sb.from('scores').insert(payload));
    }
    if (error) {
      showToast(`保存失敗: ${error.message}`, 'error');
      btn.disabled = false; btn.textContent = '保存する';
      return;
    }
  }

  closeModal('modal-add');
  showToast('保存しました。データを再読み込みします…', 'success');
  btn.disabled = false; btn.textContent = '保存する';
  ['add-title','add-composer','add-arranger','add-notes'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('add-distributed').checked = false;

  // データ再取得
  await loadScores();
});

// ═══════════════════════════════════════════
//  データ読み込み（GAS + Supabase をマージ）
// ═══════════════════════════════════════════
async function loadScores(forceRefresh = false) {
  // ローディング表示
  document.getElementById('scores-tbody').innerHTML = `
    <tr><td colspan="5" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">
      <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>読み込み中…
    </td></tr>`;

  if (forceRefresh) clearSongsCache();

  // GASからデータ取得
  let gasSongs = [];
  try {
    const result = await fetchSongs();
    gasSongs = result.songs ?? [];
  } catch (e) {
    console.warn('[memberportal] GASデータ取得失敗:', e.message);
    showToast('楽譜データの取得に失敗しました。GASの設定を確認してください。', 'error');
  }

  // Supabaseから補足情報取得
  let supaScores = [];
  if (_sb) {
    const { data } = await _sb.from('scores').select('*');
    supaScores = data ?? [];
  }

  // マージ
  if (gasSongs.length > 0) {
    allScores = mergeScoresData(gasSongs, supaScores);
  } else {
    // GASデータがない場合はSupabaseのみ表示（フォールバック）
    allScores = supaScores.map(s => ({
      ...s, gasparts: [], supaId: s.id,
    }));
  }

  renderTable();
}

// ═══════════════════════════════════════════
//  初期化
// ═══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {

  // 権限チェック
  isEditor = checkEditorRole();

  // 編集ボタン（管理者・蔵書委員のみ）
  document.getElementById('page-actions').innerHTML = isEditor
    ? `<button class="btn btn-gold" onclick="openModal('modal-add')">
         <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16">
           <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
         </svg>
         楽譜情報を登録
       </button>`
    : '';

  // 閲覧者通知
  if (!isEditor) {
    document.getElementById('readonly-notice').style.display = 'flex';
  }

  // フィルターイベント
  document.getElementById('search-input').addEventListener('input', renderTable);
  document.getElementById('filter-part').addEventListener('change', renderTable);
  document.getElementById('filter-dist').addEventListener('change', renderTable);

  // 更新ボタン
  document.getElementById('btn-reload').addEventListener('click', () => loadScores(true));

  // データ読み込み
  await loadScores();
});
</script>
