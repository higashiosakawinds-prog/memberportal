<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>団員一覧 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .search-bar { display:flex; gap:var(--space-3); margin-bottom:var(--space-4); flex-wrap:wrap; }
    .search-bar input, .search-bar select { flex:1; min-width:160px; }
    .part-filter { display:flex; gap:var(--space-2); flex-wrap:wrap; margin-bottom:var(--space-4); }
    .part-chip {
      padding:var(--space-1) var(--space-3); border-radius:var(--radius-full);
      font-size:var(--text-xs); font-weight:500; cursor:pointer;
      border:1px solid var(--gray-300); background:var(--white); color:var(--gray-600);
      transition:all var(--transition-fast);
    }
    .part-chip.active { background:var(--navy-800); color:var(--gold-300); border-color:var(--navy-800); }

    /* ── メンバーリスト ── */
    .member-list { display:flex; flex-direction:column; gap:0; }
    .member-row {
      background:var(--white);
      border-bottom:1px solid var(--gray-200);
      padding:var(--space-4) var(--space-5);
      display:grid;
      grid-template-columns:1fr auto;
      align-items:center;
      gap:var(--space-3);
      transition:background var(--transition-fast);
    }
    .member-row:first-child { border-radius:var(--radius-lg) var(--radius-lg) 0 0; }
    .member-row:last-child  { border-bottom:none; border-radius:0 0 var(--radius-lg) var(--radius-lg); }
    .member-row:only-child  { border-radius:var(--radius-lg); }
    .member-row:hover { background:var(--gray-100); }

    /* 行1：名前・フリガナ */
    .member-row__line1 {
      display:flex; align-items:baseline; gap:var(--space-3);
      margin-bottom:var(--space-1); flex-wrap:wrap;
    }
    .member-row__name {
      font-weight:700; color:var(--navy-800);
      font-size:var(--text-base);
    }
    .member-row__kana {
      font-size:var(--text-xs); color:var(--gray-400);
    }

    /* 行2：メタ情報 */
    .member-row__line2 {
      display:flex; align-items:center; gap:var(--space-3);
      flex-wrap:wrap;
    }
    .member-row__part {
      font-size:var(--text-sm); color:var(--gray-600);
      display:flex; align-items:center; gap:var(--space-1);
    }
    .member-row__part::before {
      content:'';
      display:inline-block;
      width:6px; height:6px;
      border-radius:50%;
      background:var(--gold-500);
      flex-shrink:0;
    }
    .member-row__joined {
      font-size:var(--text-xs); color:var(--gray-400);
    }
    .member-row__badges {
      display:flex; gap:var(--space-1); flex-wrap:wrap; align-items:center;
    }

    /* 詳細ボタン列 */
    .member-row__action { flex-shrink:0; }

    /* モーダル詳細 */
    .detail-section-label {
      font-size:var(--text-xs); font-weight:700; color:var(--gold-500);
      letter-spacing:.15em; text-transform:uppercase;
      border-bottom:1px solid var(--gray-200);
      padding-bottom:var(--space-2); margin-bottom:var(--space-3); margin-top:var(--space-5);
    }
    .detail-section-label:first-child { margin-top:0; }
    .detail-dl {
      display:grid; grid-template-columns:100px 1fr;
      gap:var(--space-2) var(--space-4);
      font-size:var(--text-sm);
    }
    .detail-dl dt { color:var(--gray-500); }
    .detail-dl dd { color:var(--gray-800); font-weight:500; word-break:break-all; }

    /* スマホ対応 */
    @media(max-width:640px) {
      .member-row {
        padding:var(--space-3) var(--space-4);
        grid-template-columns:1fr auto;
        gap:var(--space-2);
      }
      .member-row__line2 { gap:var(--space-2); }
      .detail-dl { grid-template-columns:88px 1fr; }
    }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">MEMBERS</p>
        <h1 class="page-header__title">団員一覧</h1>
      </div>
      <div class="page-header__actions">
        <span id="member-count" style="font-size:var(--text-sm);color:var(--gray-500);"></span>
      </div>
    </div>

    <!-- 検索・フィルター -->
    <div class="card fade-in fade-in-1 mb-6">
      <div class="card__body">
        <div class="search-bar">
          <input type="text" id="search-input" class="form-control" placeholder="氏名・フリガナで検索…">
          <select id="filter-category" class="form-control" style="max-width:160px;">
            <option value="">すべての区分</option>
            <option value="regular">正団員</option>
            <option value="trainee">準団員</option>
            <option value="rest">休団中</option>
            <option value="support">賛助</option>
          </select>
          <select id="filter-role" class="form-control" style="max-width:160px;">
            <option value="">すべての役職</option>
            <option value="gm">GM</option>
            <option value="admin">管理者</option>
            <option value="conductor">指揮者</option>
            <option value="manager">運営委員</option>
            <option value="treasurer">会計</option>
            <option value="librarian">蔵書委員</option>
            <option value="member">一般団員</option>
          </select>
        </div>
        <div class="part-filter" id="part-filter"></div>
      </div>
    </div>

    <!-- 団員リスト -->
    <div class="card fade-in fade-in-2" style="overflow:hidden;">
      <div class="member-list" id="member-list">
        <div style="text-align:center;padding:var(--space-16);color:var(--gray-500);">
          <div class="loading-spinner" style="margin:0 auto var(--space-4);"></div>
          <p>読み込み中…</p>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ── 詳細モーダル（GM・管理者のみ） ── -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <h2 class="modal__title" id="detail-modal-title">団員詳細</h2>
      <button class="modal__close" onclick="closeModal('modal-detail')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" id="detail-modal-body"></div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-detail')">閉じる</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script>
const PART_LABELS = {
  flute:'フルート', oboe:'オーボエ', clarinet:'クラリネット', bassoon:'ファゴット',
  saxophone:'サクソフォーン', horn:'ホルン', trumpet:'トランペット', trombone:'トロンボーン',
  euphonium:'ユーフォニアム', tuba:'テューバ', percussion:'打楽器', contrabass:'コントラバス',
  piano:'ピアノ', staff:'スタッフ', other:'その他',
};
const CATEGORY_LABELS = { regular:'正団員', trainee:'準団員', rest:'休団中', support:'賛助' };
const CATEGORY_BADGE  = { regular:'badge-success', trainee:'badge-navy', rest:'badge-warning', support:'badge-gold' };

// 詳細モーダルの閲覧権限ロール
const DETAIL_ROLES = ['gm', 'admin'];

const DEMO_MEMBERS = [
  { id:'1', last_name:'山田', first_name:'太郎', last_kana:'ヤマダ', first_kana:'タロウ', part:'clarinet', roles:['admin'], category:'regular', joined_date:'2020-04-01', email:'yamada@example.com', phone:'090-0000-0001', birthday:'1995-08-15', emergency_contact:'山田 花子：母：090-0000-0099', created_at:'2020-04-01T00:00:00Z' },
  { id:'2', last_name:'鈴木', first_name:'花子', last_kana:'スズキ', first_kana:'ハナコ', part:'flute', roles:['conductor'], category:'regular', joined_date:'2019-04-01', email:'suzuki@example.com', phone:'090-0000-0002', birthday:'1990-03-22', emergency_contact:'', created_at:'2019-04-01T00:00:00Z' },
  { id:'3', last_name:'田中', first_name:'一郎', last_kana:'タナカ', first_kana:'イチロウ', part:'trumpet', roles:['manager'], category:'regular', joined_date:'2021-09-01', email:'tanaka@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2021-09-01T00:00:00Z' },
  { id:'4', last_name:'佐藤', first_name:'美咲', last_kana:'サトウ', first_kana:'ミサキ', part:'horn', roles:['treasurer'], category:'regular', joined_date:'2022-04-01', email:'sato@example.com', phone:'090-0000-0004', birthday:'1998-12-01', emergency_contact:'', created_at:'2022-04-01T00:00:00Z' },
  { id:'5', last_name:'伊藤', first_name:'健太', last_kana:'イトウ', first_kana:'ケンタ', part:'trombone', roles:['librarian'], category:'regular', joined_date:'2023-04-01', email:'ito@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2023-04-01T00:00:00Z' },
  { id:'6', last_name:'渡辺', first_name:'さくら', last_kana:'ワタナベ', first_kana:'サクラ', part:'saxophone', roles:['member'], category:'regular', joined_date:'2022-09-01', email:'watanabe@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2022-09-01T00:00:00Z' },
  { id:'7', last_name:'中村', first_name:'大輔', last_kana:'ナカムラ', first_kana:'ダイスケ', part:'tuba', roles:['member'], category:'regular', joined_date:'2024-04-01', email:'nakamura@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2024-04-01T00:00:00Z' },
  { id:'8', last_name:'小林', first_name:'恵', last_kana:'コバヤシ', first_kana:'メグミ', part:'percussion', roles:['member'], category:'trainee', joined_date:'2024-10-01', email:'kobayashi@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2024-10-01T00:00:00Z' },
  { id:'9', last_name:'加藤', first_name:'浩二', last_kana:'カトウ', first_kana:'コウジ', part:'euphonium', roles:['member'], category:'rest', joined_date:'2021-04-01', email:'kato@example.com', phone:'', birthday:'', emergency_contact:'', created_at:'2021-04-01T00:00:00Z' },
];

let allMembers = [];
let activePartFilter = '';

// ─── 権限チェック：ログイン者が詳細閲覧可能か ───
function canViewDetail() {
  const user = getSessionUser();
  if (!user) return false;
  const userRoles = Array.isArray(user.roles) ? user.roles : [user.role].filter(Boolean);
  return userRoles.some(r => DETAIL_ROLES.includes(r));
}

// ─── 在籍開始年月フォーマット ───
function formatJoinedDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '—';
  return `${d.getFullYear()}年${d.getMonth() + 1}月`;
}

// ─── 生年月日フォーマット ───
function formatBirthday(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '—';
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
}

// ─── 登録日時フォーマット ───
function formatCreatedAt(tsStr) {
  if (!tsStr) return '—';
  const d = new Date(tsStr);
  if (isNaN(d.getTime())) return '—';
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日`;
}

// ─── XSS対策 ───
function escHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ─── パート絞り込みチップ生成 ───
function buildPartFilter(members) {
  const parts = [...new Set(members.map(m => m.part).filter(Boolean))].sort();
  const wrap = document.getElementById('part-filter');
  wrap.innerHTML = `<button class="part-chip active" data-part="">すべて</button>` +
    parts.map(p => `<button class="part-chip" data-part="${escHtml(p)}">${escHtml(PART_LABELS[p] ?? p)}</button>`).join('');
  wrap.querySelectorAll('.part-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      activePartFilter = btn.dataset.part;
      wrap.querySelectorAll('.part-chip').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderList();
    });
  });
}

// ─── リスト描画 ───
function renderList() {
  const keyword    = document.getElementById('search-input').value.trim().toLowerCase();
  const category   = document.getElementById('filter-category').value;
  const roleFilter = document.getElementById('filter-role').value;
  const showDetail = canViewDetail();

  const filtered = allMembers.filter(m => {
    const name = `${m.last_name}${m.first_name}${m.last_kana}${m.first_kana}`.toLowerCase();
    if (keyword && !name.includes(keyword)) return false;
    if (category && m.category !== category) return false;
    if (roleFilter) {
      const memberRoles = Array.isArray(m.roles) ? m.roles : [m.role].filter(Boolean);
      if (!memberRoles.includes(roleFilter)) return false;
    }
    if (activePartFilter && m.part !== activePartFilter) return false;
    return true;
  });

  document.getElementById('member-count').textContent = `${filtered.length}名`;

  const listEl = document.getElementById('member-list');
  if (filtered.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:var(--space-16);color:var(--gray-500);">該当する団員が見つかりません</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(m => {
    const memberRoles = Array.isArray(m.roles) ? m.roles : [m.role].filter(Boolean);
    const roleBadges  = typeof renderRoleBadges === 'function' ? renderRoleBadges(memberRoles) : '';
    const catCls      = CATEGORY_BADGE[m.category] ?? 'badge-navy';

    return `
      <div class="member-row">
        <div class="member-row__info">
          <div class="member-row__line1">
            <span class="member-row__name">${escHtml(m.last_name)} ${escHtml(m.first_name)}</span>
            <span class="member-row__kana">${escHtml(m.last_kana)} ${escHtml(m.first_kana)}</span>
          </div>
          <div class="member-row__line2">
            <span class="member-row__part">${escHtml(PART_LABELS[m.part] ?? '—')}</span>
            <div class="member-row__badges">
              ${roleBadges}
              <span class="badge ${catCls}">${escHtml(CATEGORY_LABELS[m.category] ?? '—')}</span>
            </div>
            <span class="member-row__joined">${escHtml(formatJoinedDate(m.joined_date))}〜</span>
          </div>
        </div>
        ${showDetail ? `
          <div class="member-row__action">
            <button class="btn btn-sm btn-outline" onclick="openDetailModal('${escHtml(m.id)}')">詳細</button>
          </div>
        ` : ''}
      </div>`;
  }).join('');
}

// ─── 詳細モーダル ───
function openDetailModal(memberId) {
  if (!canViewDetail()) return;

  const m = allMembers.find(x => x.id === memberId);
  if (!m) return;

  const memberRoles = Array.isArray(m.roles) ? m.roles : [m.role].filter(Boolean);
  const roleBadges  = typeof renderRoleBadges === 'function' ? renderRoleBadges(memberRoles) : memberRoles.join(', ');
  const catCls      = CATEGORY_BADGE[m.category] ?? 'badge-navy';

  document.getElementById('detail-modal-title').textContent =
    `${m.last_name} ${m.first_name}`;

  document.getElementById('detail-modal-body').innerHTML = `
    <p class="detail-section-label">基本情報</p>
    <dl class="detail-dl">
      <dt>氏名</dt>
      <dd>${escHtml(m.last_name)} ${escHtml(m.first_name)}</dd>
      <dt>フリガナ</dt>
      <dd>${escHtml(m.last_kana)} ${escHtml(m.first_kana)}</dd>
      <dt>パート</dt>
      <dd>${escHtml(PART_LABELS[m.part] ?? '—')}</dd>
      <dt>役職</dt>
      <dd><span style="display:inline-flex;gap:4px;flex-wrap:wrap;">${roleBadges}</span></dd>
      <dt>区分</dt>
      <dd><span class="badge ${catCls}">${escHtml(CATEGORY_LABELS[m.category] ?? '—')}</span></dd>
      <dt>在籍開始</dt>
      <dd>${escHtml(formatJoinedDate(m.joined_date))}</dd>
    </dl>

    <p class="detail-section-label">連絡先情報</p>
    <dl class="detail-dl">
      <dt>メール</dt>
      <dd>${escHtml(m.email || '—')}</dd>
      <dt>電話番号</dt>
      <dd>${escHtml(m.phone || '—')}</dd>
      <dt>生年月日</dt>
      <dd>${escHtml(formatBirthday(m.birthday))}</dd>
      <dt>緊急連絡先</dt>
      <dd style="white-space:pre-wrap;">${escHtml(m.emergency_contact || '—')}</dd>
    </dl>

    <p class="detail-section-label">システム情報</p>
    <dl class="detail-dl">
      <dt>ユーザーID</dt>
      <dd style="font-size:var(--text-xs);color:var(--gray-400);">${escHtml(m.id)}</dd>
      <dt>登録日</dt>
      <dd>${escHtml(formatCreatedAt(m.created_at))}</dd>
    </dl>
  `;

  openModal('modal-detail');
}

document.addEventListener('DOMContentLoaded', async () => {
  const { data: membersData, error: membersError } = await DB.profiles.list();
  if (membersError) {
    console.warn('[HighasuiDX] 団員データ取得失敗。デモデータを表示します。');
  }
  allMembers = (membersData && membersData.length > 0) ? membersData : DEMO_MEMBERS;
  buildPartFilter(allMembers);
  renderList();

  document.getElementById('search-input').addEventListener('input', renderList);
  document.getElementById('filter-category').addEventListener('change', renderList);
  document.getElementById('filter-role').addEventListener('change', renderList);
});
</script>
</body>
</html>
