<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>連絡網 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── パスワードロック画面 ── */
    .lock-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: var(--navy-900);
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-4);
    }
    .lock-overlay.hidden { display: none; }
    .lock-overlay::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(37,77,122,0.3) 0%, transparent 60%);
      pointer-events: none;
    }
    .lock-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 380px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      backdrop-filter: blur(12px);
      animation: fadeInUp 0.4s ease both;
    }
    .lock-logo {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .lock-logo__icon {
      width: 56px; height: 56px;
      background: rgba(201,168,76,0.15);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-3);
    }
    .lock-logo__title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
      color: var(--white);
      margin-bottom: var(--space-1);
    }
    .lock-logo__sub {
      font-size: var(--text-xs);
      color: var(--gold-400);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .lock-error {
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.4);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      color: #f1948a;
      font-size: var(--text-sm);
      margin-bottom: var(--space-4);
      display: none;
    }
    .lock-error.show { display: block; }
    .lock-submit {
      width: 100%; padding: var(--space-4);
      background: var(--gold-500); color: var(--navy-900);
      border: none; border-radius: var(--radius-md);
      font-size: var(--text-base); font-weight: 700;
      cursor: pointer; transition: background var(--transition-fast), box-shadow var(--transition-fast);
      font-family: var(--font-body); margin-top: var(--space-2);
    }
    .lock-submit:hover { background: var(--gold-400); box-shadow: var(--shadow-gold); }
    .lock-form-control {
      background: rgba(255,255,255,0.08) !important;
      border-color: rgba(255,255,255,0.15) !important;
      color: var(--white) !important;
    }
    .lock-form-control::placeholder { color: rgba(255,255,255,0.3) !important; }
    .lock-form-control:focus {
      border-color: var(--gold-500) !important;
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15) !important;
    }
    .lock-label { color: var(--gray-300) !important; }

    /* ── メインページ ── */
    .contact-tabs {
      display: flex; gap: 0;
      border-bottom: 2px solid var(--gray-200);
      margin-bottom: var(--space-8);
    }
    .contact-tab {
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-sm); font-weight: 500;
      color: var(--gray-500); cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition-fast);
      background: none; border-top: none; border-left: none; border-right: none;
    }
    .contact-tab:hover { color: var(--navy-700); }
    .contact-tab.active { color: var(--navy-800); border-bottom-color: var(--gold-500); font-weight: 700; }
    .contact-panel { display: none; }
    .contact-panel.active { display: block; }

    /* ── 送信フォームカード ── */
    .compose-section-title {
      font-size: var(--text-xs); font-weight: 700; color: var(--gold-500);
      letter-spacing: .15em; text-transform: uppercase;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: var(--space-2); margin-bottom: var(--space-4); margin-top: var(--space-6);
    }
    .compose-section-title:first-child { margin-top: 0; }

    /* ── 団員チェックリスト ── */
    .member-check-list {
      display: flex; flex-direction: column; gap: var(--space-1);
      max-height: 220px; overflow-y: auto;
      padding: var(--space-2);
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-md);
      background: var(--gray-100);
    }
    .member-check-item {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition-fast);
    }
    .member-check-item:hover { background: rgba(37,77,122,0.06); }
    .member-check-item input {
      accent-color: var(--navy-600);
      width: 14px; height: 14px; cursor: pointer; flex-shrink: 0;
    }
    .member-check-item label {
      font-size: var(--text-sm); cursor: pointer; flex: 1;
    }

    /* ── 送信先バッジ ── */
    .target-preview {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 600;
      background: rgba(37,77,122,0.08);
      border: 1px solid rgba(37,77,122,0.2);
      color: var(--navy-600);
      margin-bottom: var(--space-4);
    }

    /* ── 履歴テーブル ── */
    .history-wrap {
      border-radius: var(--radius-lg); overflow: hidden;
      border: 1px solid var(--gray-200);
      overflow-x: auto; -webkit-overflow-scrolling: touch;
    }
    .history-wrap .table { min-width: 520px; }
    .msg-body-preview {
      font-size: var(--text-xs); color: var(--gray-500);
      max-width: 240px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── 連絡詳細モーダル本文 ── */
    .msg-detail-meta {
      display: flex; flex-wrap: wrap; gap: var(--space-2);
      margin-bottom: var(--space-4);
    }
    .msg-detail-body {
      background: var(--gray-100); border-radius: var(--radius-md);
      padding: var(--space-4); font-size: var(--text-sm);
      line-height: 1.9; white-space: pre-wrap; word-break: break-all;
      max-height: 320px; overflow-y: auto;
    }

    /* ── レスポンシブ ── */
    @media(max-width:640px) {
      .contact-tab { padding: var(--space-2) var(--space-3); font-size: var(--text-xs); }
      .history-wrap .table { min-width: 440px; }
    }
  </style>
</head>
<body>

<!-- ── パスワードロック画面 ── -->
<div class="lock-overlay" id="lock-overlay">
  <div class="lock-card">
    <div class="lock-logo">
      <div class="lock-logo__icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="var(--gold-400)" stroke-width="1.5" width="28" height="28">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
        </svg>
      </div>
      <div class="lock-logo__title">連絡網</div>
      <div class="lock-logo__sub">CONTACT PANEL</div>
    </div>

    <div class="lock-error" id="lock-error">パスワードが正しくありません。</div>

    <div class="form-group">
      <label class="form-label lock-label" for="lock-password">パスワード</label>
      <input type="password" id="lock-password" class="form-control lock-form-control"
        placeholder="パスワードを入力してください"
        autocomplete="current-password">
    </div>
    <button class="lock-submit" id="lock-submit" type="button">開く</button>
  </div>
</div>

<!-- ── ヘッダー / サイドバー ── -->
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>

  <main class="main-content">

    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">CONTACT</p>
        <h1 class="page-header__title">連絡網</h1>
      </div>
    </div>

    <!-- タブ -->
    <div class="contact-tabs fade-in fade-in-1">
      <button class="contact-tab active" data-tab="individual">個別連絡</button>
      <button class="contact-tab" data-tab="broadcast">全体連絡</button>
      <button class="contact-tab" data-tab="history">送信履歴</button>
    </div>

    <!-- ── 個別連絡タブ ── -->
    <div class="contact-panel active fade-in fade-in-2" id="panel-individual">
      <div class="card mb-6">
        <div class="card__header">
          <span class="card__title">個別連絡</span>
        </div>
        <div class="card__body">
          <p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-4);">
            宛先を選択し、メッセージを送信します。
          </p>

          <p class="compose-section-title">送信者</p>
          <div class="form-group">
            <div id="ind-sender-display" style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--radius-md);">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="var(--gray-400)" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
              <span id="ind-sender-name" style="font-size:var(--text-sm);font-weight:500;color:var(--navy-800);">—</span>
              <span id="ind-sender-email" style="font-size:var(--text-xs);color:var(--gray-500);"></span>
            </div>
          </div>

          <p class="compose-section-title">宛先設定</p>
          <div class="form-group">
            <label class="form-label">宛先団員を選択<span class="required">*</span></label>
            <div class="member-check-list" id="ind-member-list">
              <p style="font-size:var(--text-sm);color:var(--gray-500);padding:var(--space-2);">読み込み中…</p>
            </div>
            <span class="form-hint">複数選択可。それぞれのメールアドレスに送信されます。</span>
          </div>

          <div id="ind-target-preview" style="display:none;">
            <div class="target-preview" id="ind-target-badge">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
              <span id="ind-target-badge-text">—</span>
            </div>
          </div>

          <p class="compose-section-title">メール内容</p>
          <div class="form-group">
            <label class="form-label">件名<span class="required">*</span></label>
            <input type="text" id="ind-subject" class="form-control" placeholder="例：次回練習についてのご連絡">
          </div>
          <div class="form-group">
            <label class="form-label">本文<span class="required">*</span></label>
            <textarea id="ind-body" class="form-control" rows="8"
              style="resize:vertical;line-height:1.8;"
              placeholder="本文を入力してください…"
              oninput="updateIndCharCount()"></textarea>
            <div style="text-align:right;font-size:var(--text-xs);color:var(--gray-500);margin-top:var(--space-1);">
              <span id="ind-char-count">0</span>文字
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:var(--space-3);">
            <button class="btn btn-gold" id="btn-ind-preview">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
              確認して送信
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 全体連絡タブ ── -->
    <div class="contact-panel fade-in fade-in-2" id="panel-broadcast">
      <div class="card mb-6">
        <div class="card__header">
          <span class="card__title">全体連絡</span>
        </div>
        <div class="card__body">
          <div class="alert alert-info mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            <span>登録されているすべての団員に一斉送信します。送信後はダッシュボードに1か月間表示されます。</span>
          </div>

          <p class="compose-section-title">送信者</p>
          <div class="form-group">
            <div id="bc-sender-display" style="display:flex;align-items:center;gap:var(--space-3);padding:var(--space-3) var(--space-4);background:var(--gray-100);border:1px solid var(--gray-200);border-radius:var(--radius-md);">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="var(--gray-400)" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
              <span id="bc-sender-name" style="font-size:var(--text-sm);font-weight:500;color:var(--navy-800);">—</span>
              <span id="bc-sender-email" style="font-size:var(--text-xs);color:var(--gray-500);"></span>
            </div>
          </div>

          <p class="compose-section-title">メール内容</p>
          <div class="form-group">
            <label class="form-label">件名<span class="required">*</span></label>
            <input type="text" id="bc-subject" class="form-control" placeholder="例：2026年5月 全体練習スケジュールのご連絡">
          </div>
          <div class="form-group">
            <label class="form-label">本文<span class="required">*</span></label>
            <textarea id="bc-body" class="form-control" rows="10"
              style="resize:vertical;line-height:1.8;"
              placeholder="本文を入力してください…"
              oninput="updateBcCharCount()"></textarea>
            <div style="text-align:right;font-size:var(--text-xs);color:var(--gray-500);margin-top:var(--space-1);">
              <span id="bc-char-count">0</span>文字
            </div>
          </div>

          <div id="bc-target-preview" style="display:none;margin-bottom:var(--space-4);">
            <div class="target-preview">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="13" height="13"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
              <span id="bc-target-badge-text">—</span>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:var(--space-3);">
            <button class="btn btn-gold" id="btn-bc-preview">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
              確認して送信
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── 送信履歴タブ ── -->
    <div class="contact-panel fade-in fade-in-2" id="panel-history">
      <div class="mb-4" style="display:flex;justify-content:flex-end;">
        <button class="btn btn-outline btn-sm" id="btn-reload-history">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"/></svg>
          更新
        </button>
      </div>
      <div class="history-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>種別</th>
              <th>件名</th>
              <th>本文（抜粋）</th>
              <th>送信者</th>
              <th>送信日時</th>
              <th style="width:80px;"></th>
            </tr>
          </thead>
          <tbody id="history-tbody">
            <tr><td colspan="6" style="text-align:center;padding:var(--space-10);">
              <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<!-- ── 送信確認モーダル ── -->
<div class="modal-overlay" id="modal-preview">
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <h2 class="modal__title" id="preview-modal-title">送信確認</h2>
      <button class="modal__close" onclick="closeModal('modal-preview')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body">
      <p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-4);">以下の内容でメールを送信します。送信後は取り消せません。</p>
      <div class="msg-detail-meta" id="preview-meta"></div>
      <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-2);">件名</p>
      <p style="font-size:var(--text-sm);font-weight:600;color:var(--navy-800);margin-bottom:var(--space-4);" id="preview-subject"></p>
      <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-2);">本文</p>
      <div class="msg-detail-body" id="preview-body"></div>
    </div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-preview')">キャンセル</button>
      <button class="btn btn-gold" id="btn-send-confirm">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg>
        送信する
      </button>
    </div>
  </div>
</div>

<!-- ── 履歴詳細モーダル ── -->
<div class="modal-overlay" id="modal-msg-detail">
  <div class="modal" style="max-width:560px;">
    <div class="modal__header">
      <h2 class="modal__title" id="msg-detail-title">連絡内容</h2>
      <button class="modal__close" onclick="closeModal('modal-msg-detail')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" id="msg-detail-body"></div>
    <div class="modal__footer">
      <button class="btn btn-outline" onclick="closeModal('modal-msg-detail')">閉じる</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script>
// ══════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════

// ▼ 連絡網専用パスワード（本番前に変更してください）
const CONTACT_PASSWORD = 'contact2026';

// Supabase Edge Function URL（メール送信用）
// supabase.js の SUPABASE_CONFIG.url を参照
const EDGE_FUNCTION_URL = (() => {
  // SUPABASE_CONFIGが読み込まれていれば利用、なければ空文字
  try { return SUPABASE_CONFIG.url + '/functions/v1/send-contact'; } catch(e) { return ''; }
})();

// ══════════════════════════════════════════════════
//  状態
// ══════════════════════════════════════════════════
let allMembers = [];       // profiles テーブルのメンバー一覧
let pendingSend = null;    // 送信確認中のデータ

// ══════════════════════════════════════════════════
//  XSS対策
// ══════════════════════════════════════════════════
function escHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ══════════════════════════════════════════════════
//  パスワードロック
// ══════════════════════════════════════════════════
function unlock() {
  const val = document.getElementById('lock-password').value;
  if (val === CONTACT_PASSWORD) {
    document.getElementById('lock-overlay').classList.add('hidden');
    sessionStorage.setItem('contact_unlocked', '1');
    initPage();
  } else {
    document.getElementById('lock-error').classList.add('show');
    document.getElementById('lock-password').value = '';
    document.getElementById('lock-password').focus();
  }
}

document.addEventListener('DOMContentLoaded', () => {
  // セッション内でアンロック済みか確認
  if (sessionStorage.getItem('contact_unlocked') === '1') {
    document.getElementById('lock-overlay').classList.add('hidden');
    initPage();
    return;
  }
  // Enterキー対応
  document.getElementById('lock-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });
  document.getElementById('lock-submit').addEventListener('click', unlock);
});

// ══════════════════════════════════════════════════
//  ページ初期化（パスワード認証後に呼ばれる）
// ══════════════════════════════════════════════════
async function initPage() {
  await loadMembers();
  await loadHistory();
  buildBcTargetPreview();
}

// ══════════════════════════════════════════════════
//  タブ切り替え
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.contact-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.contact-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.contact-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    });
  });
});

// ══════════════════════════════════════════════════
//  団員データ読み込み
// ══════════════════════════════════════════════════
async function loadMembers() {
  if (!_sb) return;
  const { data, error } = await _sb
    .from('profiles')
    .select('id, last_name, first_name, part, email, roles')
    .order('last_name');

  if (error) {
    console.error('[HighasuiDX] 団員一覧取得エラー:', error.message);
    return;
  }

  allMembers = data ?? [];

  // ログイン中ユーザー情報を送信者表示欄にセット
  const sessionUser = getSessionUser();
  const selfMember = sessionUser ? allMembers.find(m => m.id === sessionUser.id) : null;
  const senderName  = selfMember ? selfMember.last_name + selfMember.first_name : (sessionUser?.name ?? '—');
  const senderEmail = selfMember?.email ?? '';

  ['ind','bc'].forEach(prefix => {
    const nameEl  = document.getElementById(`${prefix}-sender-name`);
    const emailEl = document.getElementById(`${prefix}-sender-email`);
    if (nameEl)  nameEl.textContent  = senderName;
    if (emailEl) emailEl.textContent = senderEmail ? `(${senderEmail})` : '';
  });

  // 個別連絡の団員チェックリスト
  renderIndMemberList();
  buildBcTargetPreview();
}

// ── 個別連絡：チェックリスト描画 ──
function renderIndMemberList() {
  const wrap = document.getElementById('ind-member-list');
  if (!allMembers.length) {
    wrap.innerHTML = '<p style="font-size:var(--text-sm);color:var(--gray-500);padding:var(--space-2);">団員データがありません</p>';
    return;
  }
  const PART_LABELS = {
    flute:'Fl', oboe:'Ob', clarinet:'Cl', bassoon:'Fg', saxophone:'Sax',
    horn:'Hr', trumpet:'Tp', trombone:'Tb', euphonium:'Euph', tuba:'Tuba',
    percussion:'Perc', contrabass:'CB', piano:'Pf', staff:'Staff', other:'他',
    piccolo:'Pic', bassclarinet:'B.Cl', ssaxophone:'S.Sax', asaxophone:'A.Sax',
    tsaxophone:'T.Sax', bsaxophone:'B.Sax',
  };
  wrap.innerHTML = allMembers.filter(m => m.email).map(m =>
    `<div class="member-check-item">
      <input type="checkbox" id="mc_${escHtml(m.id)}" value="${escHtml(m.id)}"
        onchange="updateIndTargetPreview()">
      <label for="mc_${escHtml(m.id)}">
        ${escHtml(m.last_name + m.first_name)}
        <span style="color:var(--gray-400);font-size:var(--text-xs);margin-left:4px;">${escHtml(PART_LABELS[m.part] ?? m.part ?? '')}</span>
      </label>
    </div>`
  ).join('');
}

// ── 個別連絡：送信先バッジ更新 ──
function updateIndTargetPreview() {
  const checked = getCheckedMemberIds();
  const wrap = document.getElementById('ind-target-preview');
  if (checked.length === 0) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  document.getElementById('ind-target-badge-text').textContent =
    `${checked.length}名に送信`;
}

function getCheckedMemberIds() {
  return Array.from(document.querySelectorAll('#ind-member-list input:checked'))
    .map(el => el.value);
}

// ── 全体連絡：送信先バッジ更新 ──
function buildBcTargetPreview() {
  const count = allMembers.filter(m => m.email).length;
  const wrap = document.getElementById('bc-target-preview');
  wrap.style.display = count > 0 ? 'block' : 'none';
  document.getElementById('bc-target-badge-text').textContent =
    `全団員 ${count}名に送信`;
}

// ── 文字数カウント ──
function updateIndCharCount() {
  document.getElementById('ind-char-count').textContent =
    document.getElementById('ind-body').value.length;
}
function updateBcCharCount() {
  document.getElementById('bc-char-count').textContent =
    document.getElementById('bc-body').value.length;
}

// ══════════════════════════════════════════════════
//  送信確認モーダルを開く
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-ind-preview').addEventListener('click', () => openSendPreview('individual'));
  document.getElementById('btn-bc-preview').addEventListener('click',  () => openSendPreview('broadcast'));
  document.getElementById('btn-send-confirm').addEventListener('click', executeSend);
  document.getElementById('btn-reload-history').addEventListener('click', loadHistory);
});

function openSendPreview(type) {
  // ログイン中ユーザーを送信者として取得
  const sessionUser = getSessionUser();
  const selfMember  = sessionUser ? allMembers.find(m => m.id === sessionUser.id) : null;
  const senderId    = selfMember?.id    ?? sessionUser?.id    ?? '';
  const senderName  = selfMember ? selfMember.last_name + selfMember.first_name : (sessionUser?.name ?? '');
  const senderEmail = selfMember?.email ?? '';

  // バリデーション
  if (type === 'individual') {
    const targets  = getCheckedMemberIds();
    const subject  = document.getElementById('ind-subject').value.trim();
    const body     = document.getElementById('ind-body').value.trim();
    if (targets.length === 0) { showToast('宛先を1名以上選択してください', 'error'); return; }
    if (!subject)  { showToast('件名を入力してください', 'error'); return; }
    if (!body)     { showToast('本文を入力してください', 'error'); return; }

    const targetNames = targets.map(id => {
      const m = allMembers.find(x => x.id === id);
      return m ? m.last_name + m.first_name : id;
    });

    pendingSend = { type, senderId, senderName, senderEmail,
      targets, targetNames, subject, body };

    document.getElementById('preview-modal-title').textContent = '個別連絡 — 送信確認';
    document.getElementById('preview-meta').innerHTML =
      `<span class="badge badge-navy">個別連絡</span>
       <span class="badge badge-navy">宛先：${escHtml(targetNames.join('、'))}</span>
       <span class="badge badge-navy">送信者：${escHtml(senderName)}</span>`;

  } else {
    const subject  = document.getElementById('bc-subject').value.trim();
    const body     = document.getElementById('bc-body').value.trim();
    if (!subject)  { showToast('件名を入力してください', 'error'); return; }
    if (!body)     { showToast('本文を入力してください', 'error'); return; }

    const allCount = allMembers.filter(m => m.email).length;

    pendingSend = { type, senderId, senderName, senderEmail,
      targets: null, subject, body, allCount };

    document.getElementById('preview-modal-title').textContent = '全体連絡 — 送信確認';
    document.getElementById('preview-meta').innerHTML =
      `<span class="badge badge-danger">全体連絡</span>
       <span class="badge badge-navy">全団員 ${allCount}名</span>
       <span class="badge badge-navy">送信者：${escHtml(senderName)}</span>`;
  }

  document.getElementById('preview-subject').textContent = pendingSend.subject;
  document.getElementById('preview-body').textContent    = pendingSend.body;
  openModal('modal-preview');
}

// ══════════════════════════════════════════════════
//  実際の送信処理
// ══════════════════════════════════════════════════
async function executeSend() {
  if (!pendingSend || !_sb) { showToast('送信準備ができていません', 'error'); return; }

  const btn = document.getElementById('btn-send-confirm');
  btn.disabled = true;
  btn.textContent = '送信中…';

  try {
    const now = new Date().toISOString();

    // ── Supabase contact_messages テーブルに保存 ──
    const recordBase = {
      type:         pendingSend.type,
      subject:      pendingSend.subject,
      body:         pendingSend.body,
      sender_id:    pendingSend.senderId,
      sender_name:  pendingSend.senderName,
      sender_email: pendingSend.senderEmail,
      sent_at:      now,
    };

    if (pendingSend.type === 'individual') {
      recordBase.target_member_ids   = pendingSend.targets;
      recordBase.target_member_names = pendingSend.targetNames;
    } else {
      recordBase.target_member_ids   = null;
      recordBase.target_member_names = null;
    }

    const { error: dbError } = await _sb.from('contact_messages').insert(recordBase);
    if (dbError) throw new Error('DB保存エラー: ' + dbError.message);

    // ── Edge Function でメール送信（未デプロイ時はスキップ） ──
    if (EDGE_FUNCTION_URL) {
      try {
        let toEmails = [];
        if (pendingSend.type === 'individual') {
          toEmails = pendingSend.targets
            .map(id => allMembers.find(m => m.id === id)?.email)
            .filter(Boolean);
          if (pendingSend.senderEmail) toEmails.push(pendingSend.senderEmail);
        } else {
          toEmails = allMembers.map(m => m.email).filter(Boolean);
        }

        const { data: sessionData } = await _sb.auth.getSession();
        const token = sessionData?.session?.access_token;

        if (token && toEmails.length > 0) {
          const res = await fetch(EDGE_FUNCTION_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`,
            },
            body: JSON.stringify({
              to:      toEmails,
              subject: pendingSend.subject,
              body:    pendingSend.body,
              type:    pendingSend.type,
            }),
          });
          if (!res.ok) {
            console.warn('[HighasuiDX] Edge Function エラー（無視）:', res.status, res.statusText);
          }
        }
      } catch (edgeErr) {
        // CORS・ネットワークエラーはログのみ。DB保存は完了済みのため続行。
        console.warn('[HighasuiDX] Edge Function 呼び出し失敗（無視）:', edgeErr.message);
      }
    }

    // 成功
    closeModal('modal-preview');
    showToast('送信しました（連絡履歴に記録）', 'success');
    pendingSend = null;

    // フォームクリア
    if (recordBase.type === 'individual') {
      document.getElementById('ind-subject').value = '';
      document.getElementById('ind-body').value    = '';
      document.querySelectorAll('#ind-member-list input').forEach(el => el.checked = false);
      updateIndCharCount();
      updateIndTargetPreview();
    } else {
      document.getElementById('bc-subject').value = '';
      document.getElementById('bc-body').value    = '';
      updateBcCharCount();
    }

    await loadHistory();

  } catch(e) {
    console.error('[HighasuiDX] 送信エラー:', e);
    showToast('送信に失敗しました: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5"/></svg> 送信する`;
  }
}

// ══════════════════════════════════════════════════
//  送信履歴
// ══════════════════════════════════════════════════
async function loadHistory() {
  const tbody = document.getElementById('history-tbody');
  tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-10);">
    <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>
  </td></tr>`;

  if (!_sb) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-8);color:var(--gray-500);">Supabase未接続のためデータを取得できません。</td></tr>`;
    return;
  }

  const { data, error } = await _sb
    .from('contact_messages')
    .select('*')
    .order('sent_at', { ascending: false })
    .limit(200);

  if (error) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-8);color:var(--danger);">データの取得に失敗しました。</td></tr>`;
    return;
  }

  if (!data || data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">送信履歴はありません</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(msg => {
    const typeLabel = msg.type === 'broadcast'
      ? '<span class="badge badge-danger">全体連絡</span>'
      : '<span class="badge badge-navy">個別連絡</span>';
    const sentDate = msg.sent_at
      ? new Date(msg.sent_at).toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
      : '—';
    const bodyPreview = (msg.body ?? '').replace(/\n/g, ' ').slice(0, 60) + ((msg.body ?? '').length > 60 ? '…' : '');

    return `
      <tr>
        <td>${typeLabel}</td>
        <td style="font-weight:600;color:var(--navy-800);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${escHtml(msg.subject)}
        </td>
        <td><div class="msg-body-preview">${escHtml(bodyPreview)}</div></td>
        <td style="font-size:var(--text-sm);color:var(--gray-600);">${escHtml(msg.sender_name ?? '—')}</td>
        <td style="font-size:var(--text-xs);color:var(--gray-500);white-space:nowrap;">${escHtml(sentDate)}</td>
        <td>
          <button class="btn btn-sm btn-outline" onclick="openMsgDetail('${escHtml(msg.id)}')">詳細</button>
        </td>
      </tr>`;
  }).join('');
}

// ── 履歴詳細モーダル ──
let historyCache = [];
async function openMsgDetail(id) {
  // キャッシュから探す（loadHistory済みの場合）
  if (!_sb) return;
  const { data, error } = await _sb
    .from('contact_messages')
    .select('*')
    .eq('id', id)
    .single();

  if (error || !data) { showToast('詳細の取得に失敗しました', 'error'); return; }

  const sentDate = data.sent_at
    ? new Date(data.sent_at).toLocaleString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' })
    : '—';

  const typeLabel = data.type === 'broadcast'
    ? '<span class="badge badge-danger">全体連絡</span>'
    : '<span class="badge badge-navy">個別連絡</span>';

  let targetStr = '—';
  if (data.type === 'individual' && Array.isArray(data.target_member_names) && data.target_member_names.length > 0) {
    targetStr = data.target_member_names.join('、');
  } else if (data.type === 'broadcast') {
    targetStr = '全団員';
  }

  document.getElementById('msg-detail-title').textContent = data.subject ?? '連絡内容';
  document.getElementById('msg-detail-body').innerHTML = `
    <div class="msg-detail-meta">
      ${typeLabel}
      <span class="badge badge-navy">送信者：${escHtml(data.sender_name ?? '—')}</span>
      <span class="badge badge-navy">${escHtml(sentDate)}</span>
    </div>
    <p style="font-size:var(--text-xs);color:var(--gray-500);margin-bottom:var(--space-2);">宛先：${escHtml(targetStr)}</p>
    <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-2);">件名</p>
    <p style="font-size:var(--text-sm);font-weight:600;color:var(--navy-800);margin-bottom:var(--space-4);">${escHtml(data.subject)}</p>
    <p style="font-size:var(--text-xs);font-weight:700;color:var(--navy-800);letter-spacing:.1em;text-transform:uppercase;margin-bottom:var(--space-2);">本文</p>
    <div class="msg-detail-body">${escHtml(data.body ?? '')}</div>
  `;

  openModal('modal-msg-detail');
}
</script>
</body>
</html>
