<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設定 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .settings-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--gray-200);
      margin-bottom: var(--space-8);
    }
    .settings-tab {
      padding: var(--space-3) var(--space-6);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--gray-500);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition-fast);
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .settings-tab:hover { color: var(--navy-700); }
    .settings-tab.active { color: var(--navy-800); border-bottom-color: var(--gold-500); font-weight: 700; }
    .settings-panel { display: none; }
    .settings-panel.active { display: block; }

    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .section-label {
      font-size: var(--text-xs); font-weight: 700; color: var(--gold-500);
      letter-spacing: .15em; text-transform: uppercase;
      border-bottom: 1px solid var(--gray-200);
      padding-bottom: var(--space-2); margin-bottom: var(--space-4); margin-top: var(--space-6);
    }
    .section-label:first-child { margin-top: 0; }

    /* フィールドエラー */
    .form-control.field-error { border-color: var(--danger); box-shadow: 0 0 0 3px rgba(192,57,43,0.12); }
    .field-error-msg { font-size: var(--text-xs); color: var(--danger); margin-top: var(--space-1); display: none; }
    .field-error-msg.show { display: block; }

    /* 読み取り専用フィールド */
    .form-control[readonly] { background: var(--gray-100); color: var(--gray-500); cursor: default; }

    @media(max-width: 640px) {
      .form-row-2 { grid-template-columns: 1fr; }
      .settings-tab { padding: var(--space-2) var(--space-3); font-size: var(--text-xs); }
    }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">SETTINGS</p>
        <h1 class="page-header__title">設定</h1>
      </div>
    </div>

    <!-- タブ -->
    <div class="settings-tabs fade-in fade-in-1">
      <button class="settings-tab active" data-tab="profile">個人情報</button>
      <button class="settings-tab" data-tab="password">パスワード変更</button>
    </div>

    <!-- ── 個人情報パネル ── -->
    <div class="settings-panel active fade-in fade-in-2" id="panel-profile">
      <div class="card">
        <div class="card__header">
          <span class="card__title">個人情報の確認・変更</span>
        </div>
        <div class="card__body">

          <!-- 読み込み中 -->
          <div id="profile-loading" style="text-align:center;padding:var(--space-10);">
            <div class="loading-spinner" style="margin:0 auto var(--space-3);"></div>
            <p style="font-size:var(--text-sm);color:var(--gray-500);">読み込み中…</p>
          </div>

          <!-- フォーム本体（読み込み後に表示） -->
          <div id="profile-form" style="display:none;">

            <div id="profile-error-box" class="alert" style="background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.25);color:var(--danger);margin-bottom:var(--space-4);display:none;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
              <span id="profile-error-text"></span>
            </div>

            <!-- 基本情報 -->
            <p class="section-label">基本情報</p>
            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label" for="p-last-name">姓 <span class="required">*</span></label>
                <input type="text" id="p-last-name" class="form-control">
                <span class="field-error-msg" id="perr-last-name"></span>
              </div>
              <div class="form-group">
                <label class="form-label" for="p-first-name">名 <span class="required">*</span></label>
                <input type="text" id="p-first-name" class="form-control">
                <span class="field-error-msg" id="perr-first-name"></span>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label" for="p-last-kana">姓（フリガナ）<span class="required">*</span></label>
                <input type="text" id="p-last-kana" class="form-control">
                <span class="field-error-msg" id="perr-last-kana"></span>
              </div>
              <div class="form-group">
                <label class="form-label" for="p-first-kana">名（フリガナ）<span class="required">*</span></label>
                <input type="text" id="p-first-kana" class="form-control">
                <span class="field-error-msg" id="perr-first-kana"></span>
              </div>
            </div>

            <!-- 役職（参照のみ：変更は管理者が行う） -->
            <div class="form-group">
              <label class="form-label">役職</label>
              <div id="p-roles-display" style="display:flex;flex-wrap:wrap;gap:var(--space-2);padding:var(--space-3) 0;"></div>
              <span class="form-hint">役職の変更は管理者にお問い合わせください。</span>
            </div>

            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label" for="p-part">パート <span class="required">*</span></label>
                <select id="p-part" class="form-control">
                  <option value="">選択してください</option>
                  <optgroup label="木管楽器">
                    <option value="flute">フルート</option>
                    <option value="oboe">オーボエ</option>
                    <option value="clarinet">クラリネット</option>
                    <option value="bassoon">ファゴット</option>
                    <option value="saxophone">サクソフォーン</option>
                  </optgroup>
                  <optgroup label="金管楽器">
                    <option value="horn">ホルン</option>
                    <option value="trumpet">トランペット</option>
                    <option value="trombone">トロンボーン</option>
                    <option value="euphonium">ユーフォニアム</option>
                    <option value="tuba">テューバ</option>
                  </optgroup>
                  <optgroup label="打楽器・その他">
                    <option value="percussion">打楽器</option>
                    <option value="contrabass">コントラバス</option>
                    <option value="piano">ピアノ</option>
                  </optgroup>
                  <optgroup label="その他">
                    <option value="staff">スタッフ</option>
                    <option value="other">その他</option>
                  </optgroup>
                </select>
                <span class="field-error-msg" id="perr-part"></span>
              </div>
              <div class="form-group">
                <label class="form-label" for="p-category">区分</label>
                <input type="text" id="p-category" class="form-control" readonly>
                <span class="form-hint">区分の変更は管理者にお問い合わせください。</span>
              </div>
            </div>
            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label" for="p-joined-date">在籍開始年月日</label>
                <input type="date" id="p-joined-date" class="form-control" readonly>
              </div>
            </div>

            <!-- 連絡先情報 -->
            <p class="section-label">連絡先情報</p>
            <div class="form-group">
              <label class="form-label" for="p-email">メールアドレス</label>
              <input type="email" id="p-email" class="form-control" readonly>
              <span class="form-hint">メールアドレスの変更は管理者にお問い合わせください。</span>
            </div>
            <div class="form-row-2">
              <div class="form-group">
                <label class="form-label" for="p-phone">電話番号</label>
                <input type="tel" id="p-phone" class="form-control" placeholder="090-0000-0000">
              </div>
              <div class="form-group">
                <label class="form-label" for="p-birthday">生年月日</label>
                <input type="date" id="p-birthday" class="form-control">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="p-emergency-contact">緊急連絡先</label>
              <input type="text" id="p-emergency-contact" class="form-control" placeholder="氏名：続柄：電話番号">
            </div>

            <div style="display:flex;justify-content:flex-end;margin-top:var(--space-6);">
              <button class="btn btn-gold" id="btn-save-profile">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
                変更を保存する
              </button>
            </div>
          </div><!-- /profile-form -->
        </div>
      </div>
    </div>

    <!-- ── パスワード変更パネル ── -->
    <div class="settings-panel fade-in fade-in-2" id="panel-password">
      <div class="card" style="max-width:480px;">
        <div class="card__header">
          <span class="card__title">パスワードの変更</span>
        </div>
        <div class="card__body">

          <div id="pw-error-box" class="alert" style="background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.25);color:var(--danger);margin-bottom:var(--space-4);display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            <span id="pw-error-text"></span>
          </div>
          <div id="pw-success-box" class="alert alert-success" style="margin-bottom:var(--space-4);display:none;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
            <span>パスワードを変更しました。</span>
          </div>

          <div class="form-group">
            <label class="form-label" for="pw-new">新しいパスワード <span class="required">*</span></label>
            <input type="password" id="pw-new" class="form-control" placeholder="8文字以上" autocomplete="new-password">
            <span class="form-hint">英字・数字を含む8文字以上で設定してください。</span>
            <span class="field-error-msg" id="perr-pw-new"></span>
          </div>
          <div class="form-group">
            <label class="form-label" for="pw-confirm">新しいパスワード（確認）<span class="required">*</span></label>
            <input type="password" id="pw-confirm" class="form-control" placeholder="もう一度入力してください" autocomplete="new-password">
            <span class="field-error-msg" id="perr-pw-confirm"></span>
          </div>

          <div style="display:flex;justify-content:flex-end;margin-top:var(--space-6);">
            <button class="btn btn-gold" id="btn-save-password">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
              パスワードを変更する
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script>
const KATAKANA_RE = /^[ァ-ヶー　\s]+$/;

const CATEGORY_LABELS = {
  regular: '正団員', trainee: '準団員', rest: '休団中', support: '賛助'
};

// ── タブ切り替え ──
document.querySelectorAll('.settings-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
  });
});

// ── フィールドエラーヘルパー ──
function setFieldErr(fieldId, errId, msg) {
  const f = document.getElementById(fieldId);
  const e = document.getElementById(errId);
  if (f) f.classList.add('field-error');
  if (e) { e.textContent = msg; e.classList.add('show'); }
}
function clearFieldErr(fieldId, errId) {
  const f = document.getElementById(fieldId);
  const e = document.getElementById(errId);
  if (f) f.classList.remove('field-error');
  if (e) { e.textContent = ''; e.classList.remove('show'); }
}

// ── 個人情報読み込み ──
async function loadProfile() {
  const sessionUser = getSessionUser();
  if (!sessionUser || !_sb) {
    document.getElementById('profile-loading').style.display = 'none';
    document.getElementById('profile-form').style.display = 'block';
    return;
  }

  const { data: profile, error } = await _sb
    .from('profiles')
    .select('*')
    .eq('id', sessionUser.id)
    .single();

  document.getElementById('profile-loading').style.display = 'none';

  if (error || !profile) {
    const errBox = document.getElementById('profile-error-box');
    document.getElementById('profile-error-text').textContent =
      'プロフィールの読み込みに失敗しました。';
    errBox.style.display = 'flex';
    document.getElementById('profile-form').style.display = 'block';
    return;
  }

  // フォームに値をセット
  document.getElementById('p-last-name').value  = profile.last_name  ?? '';
  document.getElementById('p-first-name').value = profile.first_name ?? '';
  document.getElementById('p-last-kana').value  = profile.last_kana  ?? '';
  document.getElementById('p-first-kana').value = profile.first_kana ?? '';
  document.getElementById('p-part').value        = profile.part       ?? '';
  document.getElementById('p-category').value   = CATEGORY_LABELS[profile.category] ?? profile.category ?? '';
  document.getElementById('p-joined-date').value = profile.joined_date ?? '';
  document.getElementById('p-email').value       = profile.email      ?? '';
  document.getElementById('p-phone').value       = profile.phone      ?? '';
  document.getElementById('p-birthday').value    = profile.birthday   ?? '';
  document.getElementById('p-emergency-contact').value = profile.emergency_contact ?? '';

  // 役職バッジ表示
  const roles = Array.isArray(profile.roles) ? profile.roles : [profile.role].filter(Boolean);
  const rolesWrap = document.getElementById('p-roles-display');
  rolesWrap.innerHTML = typeof renderRoleBadges === 'function'
    ? renderRoleBadges(roles)
    : roles.join(', ');

  document.getElementById('profile-form').style.display = 'block';
}

// ── 個人情報保存 ──
document.addEventListener('DOMContentLoaded', () => {
  loadProfile();

  document.getElementById('btn-save-profile').addEventListener('click', async () => {
    // エラーリセット
    [
      ['p-last-name','perr-last-name'],
      ['p-first-name','perr-first-name'],
      ['p-last-kana','perr-last-kana'],
      ['p-first-kana','perr-first-kana'],
      ['p-part','perr-part'],
    ].forEach(([f,e]) => clearFieldErr(f, e));
    const errBox = document.getElementById('profile-error-box');
    errBox.style.display = 'none';

    let hasError = false;
    const lastName  = document.getElementById('p-last-name').value.trim();
    const firstName = document.getElementById('p-first-name').value.trim();
    const lastKana  = document.getElementById('p-last-kana').value.trim();
    const firstKana = document.getElementById('p-first-kana').value.trim();
    const part      = document.getElementById('p-part').value;

    if (!lastName)  { setFieldErr('p-last-name','perr-last-name','姓を入力してください。'); hasError = true; }
    if (!firstName) { setFieldErr('p-first-name','perr-first-name','名を入力してください。'); hasError = true; }
    if (!lastKana) {
      setFieldErr('p-last-kana','perr-last-kana','姓（フリガナ）を入力してください。'); hasError = true;
    } else if (!KATAKANA_RE.test(lastKana)) {
      setFieldErr('p-last-kana','perr-last-kana','フリガナはカタカナで入力してください。'); hasError = true;
    }
    if (!firstKana) {
      setFieldErr('p-first-kana','perr-first-kana','名（フリガナ）を入力してください。'); hasError = true;
    } else if (!KATAKANA_RE.test(firstKana)) {
      setFieldErr('p-first-kana','perr-first-kana','フリガナはカタカナで入力してください。'); hasError = true;
    }
    if (!part) { setFieldErr('p-part','perr-part','パートを選択してください。'); hasError = true; }
    if (hasError) return;

    const btn = document.getElementById('btn-save-profile');
    btn.disabled = true;

    const sessionUser = getSessionUser();
    if (!_sb || !sessionUser) {
      showToast('Supabase未接続のため保存できません', 'error');
      btn.disabled = false;
      return;
    }

    const { error } = await _sb.from('profiles').update({
      last_name:         lastName,
      first_name:        firstName,
      last_kana:         lastKana,
      first_kana:        firstKana,
      part,
      phone:             document.getElementById('p-phone').value.trim(),
      birthday:          document.getElementById('p-birthday').value || null,
      emergency_contact: document.getElementById('p-emergency-contact').value.trim(),
    }).eq('id', sessionUser.id);

    btn.disabled = false;

    if (error) {
      document.getElementById('profile-error-text').textContent =
        `保存に失敗しました: ${error.message}`;
      errBox.style.display = 'flex';
      return;
    }

    // セッションの名前を更新
    const updated = { ...sessionUser, name: `${lastName}${firstName}` };
    sessionStorage.setItem('hs_user', JSON.stringify(updated));
    showToast('個人情報を更新しました', 'success');
  });

  // ── パスワード変更 ──
  document.getElementById('btn-save-password').addEventListener('click', async () => {
    ['pw-new','perr-pw-new','pw-confirm','perr-pw-confirm'].forEach((id, i) => {
      if (i % 2 === 0) clearFieldErr(id, ['pw-new','perr-pw-new','pw-confirm','perr-pw-confirm'][i+1]);
    });
    clearFieldErr('pw-new','perr-pw-new');
    clearFieldErr('pw-confirm','perr-pw-confirm');
    document.getElementById('pw-error-box').style.display = 'none';
    document.getElementById('pw-success-box').style.display = 'none';

    const newPw      = document.getElementById('pw-new').value;
    const confirmPw  = document.getElementById('pw-confirm').value;
    let hasError = false;

    if (!newPw) {
      setFieldErr('pw-new','perr-pw-new','新しいパスワードを入力してください。'); hasError = true;
    } else if (newPw.length < 8) {
      setFieldErr('pw-new','perr-pw-new','パスワードは8文字以上で設定してください。'); hasError = true;
    }
    if (!confirmPw) {
      setFieldErr('pw-confirm','perr-pw-confirm','確認用パスワードを入力してください。'); hasError = true;
    } else if (newPw && newPw !== confirmPw) {
      setFieldErr('pw-confirm','perr-pw-confirm','パスワードが一致しません。'); hasError = true;
    }
    if (hasError) return;

    if (!_sb) {
      showToast('Supabase未接続のため変更できません', 'error'); return;
    }

    const btn = document.getElementById('btn-save-password');
    btn.disabled = true;

    const { error } = await _sb.auth.updateUser({ password: newPw });

    btn.disabled = false;

    if (error) {
      document.getElementById('pw-error-text').textContent =
        `変更に失敗しました: ${error.message}`;
      document.getElementById('pw-error-box').style.display = 'flex';
      return;
    }

    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    document.getElementById('pw-success-box').style.display = 'flex';
    showToast('パスワードを変更しました', 'success');
  });
});
</script>
</body>
</html>
