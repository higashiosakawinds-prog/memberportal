<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>団費管理 — 東大阪吹奏楽団</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    /* タブ */
    .da-tabs { display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:var(--space-8);flex-wrap:wrap; }
    .da-tab {
      padding:var(--space-3) var(--space-5);font-size:var(--text-sm);font-weight:500;
      color:var(--gray-500);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;
      transition:all var(--transition-fast);background:none;border-top:none;border-left:none;border-right:none;white-space:nowrap;
    }
    .da-tab:hover { color:var(--navy-700); }
    .da-tab.active { color:var(--navy-800);border-bottom-color:var(--gold-500);font-weight:700; }
    .da-panel { display:none; }
    .da-panel.active { display:block; }

    /* 月タブ */
    .month-tabs { display:flex;gap:var(--space-2);flex-wrap:wrap;margin-bottom:var(--space-5); }
    .month-tab {
      padding:var(--space-2) var(--space-4);border-radius:var(--radius-full);border:1px solid var(--gray-300);
      font-size:var(--text-sm);font-weight:500;color:var(--gray-600);cursor:pointer;background:var(--white);
      transition:all var(--transition-fast);
    }
    .month-tab:hover { border-color:var(--navy-500);color:var(--navy-700); }
    .month-tab.active { background:var(--navy-800);color:var(--gold-300);border-color:var(--navy-800); }

    /* 状況テーブル */
    .st-wrap { border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--gray-200);overflow-x:auto; }
    .st-wrap .table { min-width:680px; }
    .row-cash   { background:rgba(255,243,205,.55)!important; }
    .row-credit { background:rgba(213,234,254,.55)!important; }
    .row-none   { background:rgba(255,220,220,.4)!important; }
    .row-cash:hover   { background:rgba(255,243,205,.9)!important; }
    .row-credit:hover { background:rgba(213,234,254,.9)!important; }
    .row-none:hover   { background:rgba(255,220,220,.8)!important; }

    .pay-btn {
      display:inline-flex;align-items:center;justify-content:center;
      width:28px;height:28px;border-radius:50%;border:1px solid var(--gray-300);
      cursor:pointer;background:var(--white);transition:all var(--transition-fast);font-size:13px;
    }
    .pay-btn.paid { border-color:var(--success);background:var(--success);color:var(--white); }
    .pay-btn.unpaid { color:var(--gray-400); }

    /* QRスキャン */
    .scan-wrap {
      position:relative;width:100%;max-width:340px;margin:0 auto;
      border-radius:var(--radius-lg);overflow:hidden;background:var(--navy-900);
    }
    #qr-video { width:100%;display:block; }
    .scan-overlay {
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;
    }
    .scan-frame {
      width:200px;height:200px;border:3px solid var(--gold-500);border-radius:var(--radius-md);
      box-shadow:0 0 0 9999px rgba(0,0,0,.4);position:relative;overflow:hidden;
    }
    .scan-line {
      position:absolute;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold-400),transparent);
      animation:scanLine 2s linear infinite;top:50%;
    }
    @keyframes scanLine { 0%{transform:translateY(-90px)} 100%{transform:translateY(90px)} }
    .qr-result { padding:var(--space-4);border-radius:var(--radius-md);margin-top:var(--space-4);font-size:var(--text-sm); }
    .qr-result.ok  { background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.4); }
    .qr-result.err { background:rgba(192,57,43,.12); border:1px solid rgba(192,57,43,.4); }

    /* 団費設定 */
    .fee-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:var(--space-4); }
    .fee-card { background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:var(--space-5); }
    .fee-card__label { font-size:var(--text-sm);font-weight:600;color:var(--navy-800);margin-bottom:var(--space-3); }

    /* 未払いリスト */
    .unpaid-list { display:flex;flex-direction:column;gap:var(--space-2);max-height:280px;overflow-y:auto;
      border:1px solid var(--gray-200);border-radius:var(--radius-md);padding:var(--space-2);margin-bottom:var(--space-4); }
    .unpaid-row {
      display:flex;align-items:center;justify-content:space-between;
      padding:var(--space-2) var(--space-3);border-radius:var(--radius-sm);background:var(--gray-100);font-size:var(--text-sm);
    }

    @media(max-width:768px){ .da-tab { padding:var(--space-2) var(--space-3);font-size:var(--text-xs); } }
  </style>
</head>
<body>
<header class="site-header" id="site-header"></header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div class="app-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">

    <div class="page-header fade-in">
      <div>
        <p class="page-header__eyebrow">ACCOUNTING · ADMIN</p>
        <h1 class="page-header__title">団費管理</h1>
      </div>
    </div>

    <div class="da-tabs fade-in fade-in-1">
      <button class="da-tab active" data-tab="status">支払い状況確認</button>
      <button class="da-tab" data-tab="qrscan">現金受け取り認証</button>
      <button class="da-tab" data-tab="mail">督促メール</button>
      <button class="da-tab" data-tab="fees">団費・方法設定</button>
    </div>

    <!-- ① 支払い状況確認 -->
    <div class="da-panel active" id="panel-status">
      <div style="display:flex;align-items:center;gap:var(--space-4);margin-bottom:var(--space-4);flex-wrap:wrap;">
        <div style="display:flex;gap:var(--space-3);">
          <span style="display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--gray-600);">
            <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(255,243,205,.8);border:1px solid #d4ac0d;"></span>現金
          </span>
          <span style="display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--gray-600);">
            <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(213,234,254,.8);border:1px solid #2980b9;"></span>クレジット
          </span>
          <span style="display:inline-flex;align-items:center;gap:4px;font-size:var(--text-xs);color:var(--gray-600);">
            <span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(255,220,220,.8);border:1px solid var(--danger);"></span>未設定
          </span>
        </div>
        <span id="status-count" style="font-size:var(--text-xs);color:var(--gray-500);margin-left:auto;"></span>
      </div>

      <div class="st-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>氏名</th>
              <th>パート</th>
              <th>区分</th>
              <th>支払い方法</th>
              <th id="mh0" style="text-align:center;">—</th>
              <th id="mh1" style="text-align:center;">—</th>
              <th id="mh2" style="text-align:center;">—</th>
              <th style="width:70px;"></th>
            </tr>
          </thead>
          <tbody id="status-tbody">
            <tr><td colspan="8" style="text-align:center;padding:var(--space-10);">
              <div class="loading-spinner" style="margin:0 auto;"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- ② QRスキャン -->
    <div class="da-panel" id="panel-qrscan">
      <div class="card">
        <div class="card__header"><span class="card__title">現金受け取り認証</span></div>
        <div class="card__body">
          <p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-4);">
            団員が表示するQRコードをカメラで読み取ると、対象月の支払いが自動記録されます。
          </p>
          <div style="text-align:center;margin-bottom:var(--space-4);">
            <button class="btn btn-gold" id="btn-start">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 015.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 00-1.134-.175 2.31 2.31 0 01-1.64-1.055l-.822-1.316a2.192 2.192 0 00-1.736-1.039 48.774 48.774 0 00-5.232 0 2.192 2.192 0 00-1.736 1.039l-.821 1.316z"/><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 11-9 0 4.5 4.5 0 019 0zM18.75 10.5h.008v.008h-.008V10.5z"/></svg>
              カメラを起動
            </button>
            <button class="btn btn-outline" id="btn-stop" style="display:none;margin-left:var(--space-2);">停止</button>
          </div>
          <div class="scan-wrap" id="scan-wrap" style="display:none;">
            <video id="qr-video" autoplay muted playsinline></video>
            <canvas id="qr-canvas" style="display:none;"></canvas>
            <div class="scan-overlay"><div class="scan-frame"><div class="scan-line"></div></div></div>
          </div>
          <div id="qr-result" style="display:none;" class="qr-result"></div>
          <div id="qr-confirm" style="display:none;margin-top:var(--space-4);">
            <div class="alert alert-info mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
              <div id="qr-confirm-info"></div>
            </div>
            <div style="display:flex;gap:var(--space-3);">
              <button class="btn btn-gold" id="btn-approve">支払いを記録する</button>
              <button class="btn btn-outline" id="btn-qr-cancel">キャンセル</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ③ 督促メール -->
    <div class="da-panel" id="panel-mail">
      <div class="card">
        <div class="card__header"><span class="card__title">団費未払い者への督促メール</span></div>
        <div class="card__body">
          <div class="form-group">
            <label class="form-label">対象月</label>
            <select id="mail-month" class="form-control" style="max-width:200px;"></select>
          </div>
          <p style="font-size:var(--text-sm);font-weight:500;color:var(--navy-800);margin-bottom:var(--space-3);">未払い団員</p>
          <div class="unpaid-list" id="unpaid-list">
            <p style="font-size:var(--text-sm);color:var(--gray-400);padding:var(--space-2);">月を選択してください。</p>
          </div>
          <div class="form-group">
            <label class="form-label">件名</label>
            <input type="text" id="mail-subject" class="form-control" value="【東大阪吹奏楽団】団費お支払いのお願い">
          </div>
          <div class="form-group">
            <label class="form-label">本文</label>
            <textarea id="mail-body" class="form-control" rows="9" style="resize:vertical;line-height:1.8;"></textarea>
          </div>
          <div style="display:flex;justify-content:flex-end;gap:var(--space-3);">
            <button class="btn btn-outline" id="btn-copy">メールアドレスをコピー</button>
            <button class="btn btn-gold" id="btn-open-mail">メールアプリで開く</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ④ 団費・支払い方法設定 -->
    <div class="da-panel" id="panel-fees">
      <!-- 金額設定 -->
      <div class="card mb-6">
        <div class="card__header"><span class="card__title">団費金額の設定（月額）</span></div>
        <div class="card__body">
          <div class="alert alert-info mb-5">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            <span>変更後すぐに「団費登録」ページに反映されます。</span>
          </div>
          <div class="fee-grid" id="fee-grid">
            <div style="grid-column:1/-1;text-align:center;padding:var(--space-6);"><div class="loading-spinner" style="margin:0 auto;"></div></div>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:var(--space-5);">
            <button class="btn btn-gold" id="btn-save-fees">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/></svg>
              保存する
            </button>
          </div>
        </div>
      </div>

      <!-- 支払い方法設定 -->
      <div class="card">
        <div class="card__header"><span class="card__title">団員の支払い方法設定</span></div>
        <div class="card__body">
          <p style="font-size:var(--text-sm);color:var(--gray-500);margin-bottom:var(--space-4);">
            各団員の支払い方法（現金 / クレジット）を設定します。この設定は「団費登録」ページからは変更できません。
          </p>
          <div style="overflow-x:auto;border-radius:var(--radius-lg);border:1px solid var(--gray-200);">
            <table class="table">
              <thead><tr><th>氏名</th><th>パート</th><th>区分</th><th>支払い方法</th></tr></thead>
              <tbody id="pm-tbody">
                <tr><td colspan="4" style="text-align:center;padding:var(--space-8);"><div class="loading-spinner" style="margin:0 auto;"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- 手動編集モーダル -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal" style="max-width:460px;">
    <div class="modal__header">
      <h2 class="modal__title" id="edit-title">支払い状況を編集</h2>
      <button class="modal__close" onclick="closeModal('modal-edit')">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal__body" id="edit-body"></div>
    <div class="modal__footer"><button class="btn btn-outline" onclick="closeModal('modal-edit')">閉じる</button></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script>
// ══════════════════════════════════════
//  設定・定数
// ══════════════════════════════════════
const DUES_GAS_URL = 'https://script.google.com/macros/s/AKfycbwgEdouCSt4CSomg5btY-blrVquKj3Hor7pZSDSMnDvsxNM-K9jxH8_4wfjVxYGapPBGg/exec';

const CAT_LABELS = {
  regular:'正団員', regular_student:'正団員（学生）',
  trainee:'準団員', support:'スタッフ', rest:'休団中',
};
const PART_LABELS = {
  piccolo:'Pic',flute:'Fl',oboe:'Ob',clarinet:'Cl',bassclarinet:'B.Cl',bassoon:'Fg',
  ssaxophone:'S.Sax',asaxophone:'A.Sax',tsaxophone:'T.Sax',bsaxophone:'B.Sax',
  horn:'Hr',trumpet:'Tp',trombone:'Tb',euphonium:'Euph',tuba:'Tu',
  percussion:'Perc',contrabass:'CB',piano:'Pf',staff:'Staff',other:'他',
};

// ── 状態 ──
let allMembers   = [];
let allPayments  = {};
let duesFees     = {};
let months3      = [];  // 直近3ヶ月 ['YYYY-MM', ...]
let pendingQr    = null;
let scanStream   = null;
let scanTimer    = null;

// ══════════════════════════════════════
//  ユーティリティ
// ══════════════════════════════════════
const escHtml = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isGasOk = () => DUES_GAS_URL && !DUES_GAS_URL.includes('YOUR_DUES_SCRIPT_ID');

function fmtMonth(ym) {
  const [y,m] = ym.split('-');
  return `${y}年${parseInt(m)}月`;
}

function build3Months() {
  const now = new Date(), list = [];
  for (let i=0;i<3;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    list.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
  }
  return list;
}

// ══════════════════════════════════════
//  データ取得
// ══════════════════════════════════════
async function loadMembers() {
  if (!_sb) return [];
  const { data } = await _sb.from('profiles')
    .select('id,last_name,first_name,part,category,email,payment_method')
    .order('last_name');
  return data ?? [];
}

async function loadFees() {
  if (!_sb) return {};
  const { data } = await _sb.from('dues_settings').select('*');
  const r = {};
  (data ?? []).forEach(d => { r[d.category] = d.amount; });
  return r;
}

async function loadAllPayments() {
  if (!isGasOk()) {
    // デモ
    const r = {}, now = new Date();
    allMembers.forEach(m => {
      r[m.id] = {};
      months3.forEach((k,i) => {
        r[m.id][k] = { paid: Math.random() > 0.35, confirmed_at: new Date().toISOString() };
      });
    });
    return r;
  }
  try {
    const res = await fetch(`${DUES_GAS_URL}?action=getAllPayments`,{method:'GET',redirect:'follow'});
    const json = await res.json();
    return json.data ?? {};
  } catch (e) { console.warn('全支払い取得失敗',e.message); return {}; }
}

// ══════════════════════════════════════
//  ① 支払い状況テーブル
// ══════════════════════════════════════
function renderStatusTable() {
  months3.forEach((m,i) => {
    const el = document.getElementById(`mh${i}`);
    if (el) el.textContent = fmtMonth(m);
  });

  const tbody   = document.getElementById('status-tbody');
  const targets = allMembers.filter(m => m.category !== 'rest');
  document.getElementById('status-count').textContent = `${targets.length}名表示`;

  if (!targets.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:var(--space-10);color:var(--gray-500);">団員データがありません</td></tr>`;
    return;
  }

  tbody.innerHTML = targets.map(m => {
    const pm     = m.payment_method;
    const rowCls = pm==='cash' ? 'row-cash' : pm==='credit' ? 'row-credit' : 'row-none';
    const pmBadge = pm==='cash'
      ? '<span class="badge badge-warning" style="font-size:10px;">現金</span>'
      : pm==='credit'
        ? '<span class="badge badge-navy" style="font-size:10px;">クレジット</span>'
        : '<span class="badge badge-danger" style="font-size:10px;">未設定</span>';

    const cells = months3.map(mo => {
      const paid = allPayments[m.id]?.[mo]?.paid ?? false;
      return `<td style="text-align:center;">
        <button class="pay-btn ${paid?'paid':'unpaid'}"
          onclick="togglePay('${m.id}','${mo}',${paid})"
          title="${paid?'支払い済み（クリックで取消）':'未払い（クリックで済みにする）'}">
          ${paid?'✓':''}
        </button>
      </td>`;
    }).join('');

    return `
      <tr class="${rowCls}">
        <td style="font-weight:600;color:var(--navy-800);">${escHtml(m.last_name)} ${escHtml(m.first_name)}</td>
        <td style="font-size:var(--text-sm);">${escHtml(PART_LABELS[m.part]??'—')}</td>
        <td><span class="badge badge-navy" style="font-size:10px;">${escHtml(CAT_LABELS[m.category]??'—')}</span></td>
        <td>${pmBadge}</td>
        ${cells}
        <td><button class="btn btn-sm btn-outline" onclick="openEditModal('${m.id}')">編集</button></td>
      </tr>`;
  }).join('');
}

async function togglePay(memberId, month, currentlyPaid) {
  const m = allMembers.find(x => x.id === memberId);
  const lbl = `${m?.last_name}${m?.first_name} — ${fmtMonth(month)}`;
  const msg = currentlyPaid ? `${lbl}\nの支払いを取り消しますか？` : `${lbl}\nを支払い済みにしますか？`;
  if (!confirm(msg)) return;
  await updatePay(memberId, month, !currentlyPaid);
}

async function updatePay(memberId, month, paid) {
  const now = new Date().toISOString();
  if (!allPayments[memberId]) allPayments[memberId] = {};
  allPayments[memberId][month] = { paid, confirmed_at: paid ? now : null };

  if (isGasOk()) {
    try {
      await fetch(DUES_GAS_URL, {
        method:'POST', redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({ action: paid ? 'recordPayment' : 'cancelPayment', memberId, month, confirmedAt:now }),
      });
    } catch(e){ console.warn('支払い更新失敗',e.message); }
  }

  showToast(paid ? '支払い済みにしました' : '支払いを取り消しました', 'success');
  renderStatusTable();
  updateUnpaidList();
}

function openEditModal(memberId) {
  const m = allMembers.find(x => x.id === memberId);
  if (!m) return;
  document.getElementById('edit-title').textContent = `${m.last_name} ${m.first_name} — 支払い編集`;

  document.getElementById('edit-body').innerHTML = months3.map(mo => {
    const rec  = allPayments[memberId]?.[mo];
    const paid = rec?.paid ?? false;
    const dt   = (paid && rec?.confirmed_at)
      ? new Date(rec.confirmed_at).toLocaleDateString('ja-JP',{month:'short',day:'numeric'})
      : '';
    return `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) 0;border-bottom:1px solid var(--gray-200);">
        <span style="font-size:var(--text-sm);font-weight:500;">${fmtMonth(mo)}</span>
        <div style="display:flex;align-items:center;gap:var(--space-3);">
          ${paid
            ? `<span style="font-size:var(--text-xs);color:var(--gray-500);">${dt}</span><span class="badge badge-success">済み</span>`
            : `<span class="badge" style="background:var(--gray-200);color:var(--gray-500);">未払い</span>`}
          <button class="btn btn-sm ${paid?'btn-danger':'btn-primary'}"
            onclick="updatePay('${memberId}','${mo}',${!paid});openEditModal('${memberId}')">
            ${paid?'取消':'済みにする'}
          </button>
        </div>
      </div>`;
  }).join('');
  openModal('modal-edit');
}

// ══════════════════════════════════════
//  ② QRスキャン
// ══════════════════════════════════════
async function startScan() {
  document.getElementById('qr-result').style.display  = 'none';
  document.getElementById('qr-confirm').style.display = 'none';
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display  = 'inline-flex';
  document.getElementById('scan-wrap').style.display = 'block';

  try {
    scanStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' } });
    const video  = document.getElementById('qr-video');
    const canvas = document.getElementById('qr-canvas');
    video.srcObject = scanStream;
    await video.play();

    const ctx = canvas.getContext('2d');
    scanTimer = setInterval(() => {
      if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts:'dontInvert' });
      if (code?.data) onDetected(code.data);
    }, 200);
  } catch (e) {
    showToast('カメラへのアクセスが拒否されました', 'error');
    stopScan();
  }
}

function stopScan() {
  clearInterval(scanTimer); scanTimer = null;
  scanStream?.getTracks().forEach(t => t.stop()); scanStream = null;
  document.getElementById('scan-wrap').style.display = 'none';
  document.getElementById('btn-start').style.display = 'inline-flex';
  document.getElementById('btn-stop').style.display  = 'none';
}

function onDetected(raw) {
  stopScan();
  let parsed;
  try { parsed = JSON.parse(raw); } catch {
    showQrErr('QRコードの形式が正しくありません。'); return;
  }
  if (parsed.type !== 'dues_payment') {
    showQrErr('このQRコードは団費支払い用ではありません。'); return;
  }
  pendingQr = parsed;

  const r = document.getElementById('qr-result');
  r.className = 'qr-result ok';
  r.innerHTML = `
    <p style="font-weight:700;color:var(--success);margin-bottom:4px;">QRコードを検出しました</p>
    <p>団員：${escHtml(parsed.name)}</p>
    <p>対象月：${escHtml(fmtMonth(parsed.month))}</p>`;
  r.style.display = 'block';

  document.getElementById('qr-confirm-info').innerHTML =
    `<strong>${escHtml(parsed.name)}</strong> さんの <strong>${escHtml(fmtMonth(parsed.month))}</strong>分（現金）を受け取りましたか？`;
  document.getElementById('qr-confirm').style.display = 'block';
}

function showQrErr(msg) {
  const r = document.getElementById('qr-result');
  r.className = 'qr-result err';
  r.innerHTML = `<p style="color:var(--danger);">${escHtml(msg)}</p>`;
  r.style.display = 'block';
}

async function approveQr() {
  if (!pendingQr) return;
  await updatePay(pendingQr.memberId, pendingQr.month, true);
  document.getElementById('qr-confirm').style.display = 'none';
  pendingQr = null;
}

// ══════════════════════════════════════
//  ③ 督促メール
// ══════════════════════════════════════
function buildMailMonthSelect() {
  const sel = document.getElementById('mail-month');
  sel.innerHTML = months3.map(m => `<option value="${m}">${fmtMonth(m)}</option>`).join('');
  sel.addEventListener('change', updateUnpaidList);
  updateUnpaidList();
}

function updateUnpaidList() {
  const month  = document.getElementById('mail-month').value;
  const list   = document.getElementById('unpaid-list');
  const unpaid = allMembers.filter(m => m.category !== 'rest' && !(allPayments[m.id]?.[month]?.paid ?? false));

  if (!unpaid.length) {
    list.innerHTML = `<p style="font-size:var(--text-sm);color:var(--success);padding:var(--space-2);">全員支払い済みです！</p>`;
    buildMailBody(month, []);
    return;
  }
  list.innerHTML = unpaid.map(m => `
    <div class="unpaid-row">
      <span>${escHtml(m.last_name)} ${escHtml(m.first_name)}</span>
      <span style="font-size:var(--text-xs);color:var(--gray-500);">${escHtml(m.email||'—')}</span>
    </div>`).join('');
  buildMailBody(month, unpaid);
}

function buildMailBody(month, members) {
  const now = new Date();
  document.getElementById('mail-body').value =
`団員の皆様

いつも活動にご参加いただきありがとうございます。
${fmtMonth(month)}分の団費のお支払いがまだ確認できておりません。

お支払い方法が「クレジット」の方は「団費登録」ページよりご確認ください。
「現金」の方は次回練習時に会計係までお持ちください。

${now.getFullYear()}年${now.getMonth()+1}月末日までにお支払いをお願いいたします。

ご不明な点は会計担当者までご連絡ください。

──
東大阪吹奏楽団 会計`;
}

// ══════════════════════════════════════
//  ④ 団費設定
// ══════════════════════════════════════
function renderFeeGrid() {
  const cats = ['regular','regular_student','trainee','support'];
  document.getElementById('fee-grid').innerHTML = cats.map(cat => `
    <div class="fee-card">
      <p class="fee-card__label">${CAT_LABELS[cat]??cat}</p>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" style="font-size:var(--text-xs);">月額（円）</label>
        <input type="number" class="form-control fee-in" data-cat="${cat}"
          value="${duesFees[cat]??0}" min="0" step="100">
      </div>
    </div>`).join('');
}

async function saveFees() {
  if (!_sb){ showToast('Supabase未接続','error'); return; }
  const btn = document.getElementById('btn-save-fees');
  btn.disabled = true; btn.textContent = '保存中…';
  for (const el of document.querySelectorAll('.fee-in')) {
    const cat    = el.dataset.cat;
    const amount = parseInt(el.value) || 0;
    const { error } = await _sb.from('dues_settings')
      .upsert({ category:cat, amount },{ onConflict:'category' });
    if (error){ showToast(`${CAT_LABELS[cat]}の保存失敗: ${error.message}`,'error'); break; }
    duesFees[cat] = amount;
  }
  btn.disabled = false; btn.textContent = '保存する';
  showToast('団費設定を保存しました','success');
}

function renderPmTable() {
  const tbody   = document.getElementById('pm-tbody');
  const targets = allMembers.filter(m => m.category !== 'rest');
  if (!targets.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:var(--space-8);color:var(--gray-500);">団員データがありません</td></tr>`;
    return;
  }
  tbody.innerHTML = targets.map(m => {
    const pm = m.payment_method ?? '';
    return `
      <tr>
        <td style="font-weight:600;color:var(--navy-800);">${escHtml(m.last_name)} ${escHtml(m.first_name)}</td>
        <td style="font-size:var(--text-sm);">${escHtml(PART_LABELS[m.part]??'—')}</td>
        <td><span class="badge badge-navy" style="font-size:10px;">${escHtml(CAT_LABELS[m.category]??'—')}</span></td>
        <td>
          <select class="form-control pm-sel" data-id="${m.id}" style="max-width:140px;" onchange="updatePm(this)">
            <option value="" ${!pm?'selected':''}>未設定</option>
            <option value="cash"   ${pm==='cash'  ?'selected':''}>現金</option>
            <option value="credit" ${pm==='credit'?'selected':''}>クレジット</option>
          </select>
        </td>
      </tr>`;
  }).join('');
}

async function updatePm(sel) {
  const id  = sel.dataset.id;
  const val = sel.value;
  if (!_sb){ showToast('Supabase未接続','error'); return; }
  const { error } = await _sb.from('profiles').update({ payment_method: val||null }).eq('id',id);
  if (error) { showToast('更新失敗: '+error.message,'error'); return; }
  const m = allMembers.find(x => x.id === id);
  if (m) m.payment_method = val || null;
  showToast('支払い方法を更新しました','success');
  renderStatusTable();
}

// ══════════════════════════════════════
//  初期化
// ══════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  // 権限チェック：dues_admin 権限がない場合はリダイレクト
  if (!canDo('dues_admin')) {
    document.querySelector('.main-content').innerHTML = `
      <div style="padding:var(--space-16);text-align:center;">
        <p style="font-size:var(--text-lg);font-weight:700;color:var(--danger);">このページにはアクセス権限がありません。</p>
        <a href="../index.html" class="btn btn-outline" style="margin-top:var(--space-6);">ダッシュボードに戻る</a>
      </div>`;
    return;
  }

  months3 = build3Months();

  // データ読み込み
  allMembers  = await loadMembers();
  duesFees    = await loadFees();
  allPayments = await loadAllPayments();

  // 描画
  renderStatusTable();
  renderFeeGrid();
  renderPmTable();
  buildMailMonthSelect();

  // タブ
  document.querySelectorAll('.da-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.da-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.da-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add('active');
    });
  });

  // QRスキャンボタン
  document.getElementById('btn-start').addEventListener('click', startScan);
  document.getElementById('btn-stop').addEventListener('click', stopScan);
  document.getElementById('btn-approve').addEventListener('click', approveQr);
  document.getElementById('btn-qr-cancel').addEventListener('click', () => {
    document.getElementById('qr-confirm').style.display = 'none';
    pendingQr = null;
  });

  // 団費保存
  document.getElementById('btn-save-fees').addEventListener('click', saveFees);

  // メール
  document.getElementById('btn-copy').addEventListener('click', () => {
    const month  = document.getElementById('mail-month').value;
    const emails = allMembers
      .filter(m => m.category !== 'rest' && !(allPayments[m.id]?.[month]?.paid ?? false))
      .map(m => m.email).filter(Boolean);
    navigator.clipboard.writeText(emails.join(','))
      .then(() => showToast('コピーしました','success'))
      .catch(() => showToast('コピー失敗','error'));
  });

  document.getElementById('btn-open-mail').addEventListener('click', () => {
    const month   = document.getElementById('mail-month').value;
    const subject = document.getElementById('mail-subject').value;
    const body    = document.getElementById('mail-body').value;
    const emails  = allMembers
      .filter(m => m.category !== 'rest' && !(allPayments[m.id]?.[month]?.paid ?? false))
      .map(m => m.email).filter(Boolean);
    if (!emails.length) { showToast('未払いの団員がいません','success'); return; }
    window.location.href =
      `mailto:?bcc=${encodeURIComponent(emails.join(','))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    showToast('メールアプリを開きました','success');
  });
});
</script>
